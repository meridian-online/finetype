goal: >
  Distill all downloaded benchmark datasets (Sherlock, SOTAB, GitTables, eval CSVs)
  using the Phase 2 blind-first adjudication protocol. Bank comprehensive
  disagreement data while Claude Max token budget allows. Triple objective:
  (1) establish a baseline for PR-2 rescore, (2) identify FineType weaknesses
  across diverse external benchmarks, (3) map Sherlock's 78-type ground truth
  against FineType's 250-type taxonomy to find coverage gaps.

constraints:
  - "Claude Max 20x plan — weekly token cap, resets on rolling schedule"
  - "Beelink mini PC: 16GB RAM, 5 concurrent agents max"
  - "Blind-first adjudication: Claude classifies independently before seeing FineType prediction"
  - "All 250 taxonomy labels visible in prompt (no domain cut-down)"
  - "Sherlock ground truth compared offline — not shown to distillation agents"
  - "SportsTables excluded (requires live scraping, fragile dependency)"
  - "GitTables sampled: 50 random files per topic, 94 topics"
  - "Output to output/distillation-v3/ — one CSV per batch, merged summary"
  - "Use Sonnet model to preserve Opus caps for other work"
  - "Per-batch CSVs committed to branch after each agent wave to prevent data loss"

datasets:
  - name: "Sherlock / VizNet"
    priority: 1
    location: "~/datasets/sherlock/data/data/raw/"
    format: "Parquet (train/val/test splits with values + labels)"
    columns: 686765
    columns_phase1: "137,353 (test split — standard benchmark partition)"
    columns_phase2: "549,412 (train + val — if token budget allows)"
    ground_truth: "78 DBpedia-derived semantic types"
    extraction: "Read parquet directly — values column contains JSON arrays of strings"
    header_strategy: >
      Sherlock columns have no headers. FineType runs with empty header,
      measuring value-only classification strength. This is intentional:
      reducing reliance on header hints is a strategic goal. The Claude
      blind classifier also receives no header, so the Claude vs Sherlock
      comparison is fair. The FineType vs Sherlock comparison measures
      value-only inference — expect lower agreement than headed datasets.
      Document this clearly in results.
    notes: >
      Three-way comparison: Sherlock ground truth vs Claude blind vs FineType.
      Ground truth NOT shown to agents — compared offline. Requires building
      a Sherlock→FineType 78→250 type mapping (hand-authored with LLM assist,
      reviewed by Hugh). Test split distilled first (standard benchmark
      partition), then train+val if budget allows.

  - name: "SOTAB V2 CTA"
    priority: 2
    location: "~/datasets/sotab/cta/SOTAB V2 for SemTab 2023/"
    format: "Nested ZIPs containing JSON.gz table files + CSV ground truth"
    tables: 70678
    ground_truth: "Schema.org types (40-82 labels depending on round)"
    extraction: >
      Two-step: (1) unzip inner archives to get JSON.gz table files,
      (2) extract column headers + values from JSON tables into JSONL format
      compatible with distillation pipeline. Ground truth CSVs provide
      table_name, column_index, label mappings. Validate extraction on
      100-table sample before full run (schema check: required fields
      present, values arrays non-empty, ground truth labels attached).
    extraction_fallback: >
      If extraction complexity exceeds 2 hours of implementation work,
      defer SOTAB to Wave 2 and proceed with Sherlock + GitTables.
    splits:
      round1_train: 55361
      round1_val: 598
      round1_test: 591
      round2_train: 115563
      round2_val: 1173
      round2_test: 1113
    notes: >
      Use Round 2 (82 Schema.org types, 44K tables) as primary.
      Round 1 (40 types, 26K tables) as supplementary.
      Schema.org→FineType type mapping needed for three-way comparison.

  - name: "GitTables 1M"
    priority: 3
    location: "~/datasets/gittables/parquet/"
    format: "Parquet files across 94 topic directories"
    total_files: 1018649
    sampled_files: "~4,700 (50 random files per topic, 94 topics)"
    sampled_columns: "~50K (estimated from 10.6 avg cols/file)"
    extraction: >
      Read parquet files, extract column headers + sample values.
      Random sample: 50 files per topic (deterministic seed for reproducibility).
      Sample up to 20 values per column. Convert to JSONL format.
      Track source topic for per-topic analysis.
    notes: >
      Phase 2 processed 507 files (0.13%). Full corpus is 1M files / 10.9M
      columns — too large to distill completely. 50/topic gives all 94 topics
      covered with enough depth per topic to spot topic-specific weaknesses.
      Wave 2 can target specific topics if the broad pass reveals rich
      weakness-triggering data in particular topics.

  - name: "Eval CSVs"
    priority: 4
    location: "eval/datasets/csv/"
    format: "CSV"
    files: 27
    columns: "~174 (from eval manifest)"
    extraction: "Already in CSV format — direct input to distillation pipeline"
    notes: >
      Smallest dataset. Useful as regression anchor — compare v3 distillation
      labels against prior eval manifest ground truth.

approach:
  name: "Blind-First Adjudication (v2 protocol)"
  description: >
    Same protocol as distillation v2. Each batch agent processes columns
    with two passes per column to avoid anchoring bias.
  passes:
    - name: "Pass 1 — Blind Classification"
      description: >
        Claude classifies the column from header (if available) + sample values
        + full 250-label taxonomy. No FineType prediction is shown.
      outputs:
        - "blind_label: the type label Claude selects independently"
        - "blind_confidence: high | medium | low"
    - name: "Pass 2 — Adjudication"
      description: >
        FineType's prediction is revealed (via `finetype infer --mode column`).
        If blind_label disagrees with finetype_label, Claude writes brief reasoning
        for which label is correct and selects a final_label.
      outputs:
        - "finetype_label: FineType's column-level prediction"
        - "agreement: yes | no"
        - "final_label: the adjudicated label (equals blind_label if agree)"
        - "reasoning: brief explanation when disagreement occurs"

execution:
  order:
    - "Sherlock test split (137K columns) — highest priority, external benchmark"
    - "SOTAB (70K+ tables) — requires extraction step before distillation"
    - "GitTables (50/topic, ~50K columns) — topic diversity pass"
    - "Eval CSVs (27 files) — small, slot in at the end or between larger runs"
    - "Sherlock train+val (549K columns) — if token budget allows after above"
  agent_type: "Spawned Claude Code agents via Agent tool"
  model: "sonnet"
  parallelism: "5 agents max (hardware constraint)"
  batch_size: "~50-100 columns per agent"
  resume: >
    Agents write per-batch CSVs. Completion tracked via batch_{NNN}.done
    marker files written atomically after CSV validation (row count check,
    required fields present). Skip logic checks .done marker, not CSV
    existence, to prevent partial-write corruption. Per-batch CSVs
    committed to branch after each wave of agents.

  pre_distillation_steps:
    - name: "Sherlock type mapping"
      description: >
        Build a mapping from Sherlock's 78 types to FineType's 250-type
        taxonomy. Method: LLM-assisted draft, reviewed and finalised by Hugh.
        Output: sherlock_type_mapping.csv with columns sherlock_type,
        finetype_type, mapping_confidence (exact/partial/unmapped).
        Expect non-trivial unmapped fraction — Sherlock types like
        "jockey", "album", "club" have no FineType equivalent.
      blocking: false
      notes: "Can run in parallel with distillation. Needed for offline comparison."

    - name: "Sherlock extraction"
      description: >
        Read train/val/test parquet files. Each row has a 'values' column
        (list of strings) and a corresponding label. Extract into JSONL format:
        {source: "sherlock", split: "test", index: N, header: "", values: [...],
        sherlock_label: "type"}. Test split first, then train+val.
      blocking: true

    - name: "SOTAB extraction"
      description: >
        Unzip inner Round2-SOTAB-CTA-Tables.zip. For each JSON.gz table file,
        extract column headers and sample values. Join with ground truth CSV
        to attach Schema.org labels. Output JSONL format. Validate on 100-table
        sample before full extraction.
      blocking: true

    - name: "GitTables extraction"
      description: >
        Sample 50 random files per topic (deterministic seed). For each file,
        read column headers + sample up to 20 values per column. Output JSONL
        format. Track source topic for per-topic analysis.
      blocking: true

  durability:
    description: >
      v2 distillation output was lost because it lived only on local disk
      in output/distillation-v2/ and was never committed. v3 mitigates this:
    measures:
      - "Per-batch CSVs committed to the feature branch after each wave of agents"
      - "Batch completion tracked via .done marker files (not CSV existence)"
      - "Merge step is a separate script, not part of the agent loop"
      - "Extracted JSONL files committed before distillation begins"
      - "output/distillation-v3/ added to .gitignore EXCLUSION (force-tracked)"

  label_validation:
    description: >
      Post-merge validation script (scripts/validate_distillation.py) that:
      (1) joins blind_label, finetype_label, and final_label against the
      250-label taxonomy key list, (2) reports invalid label counts and rate,
      (3) flags rows with missing required fields. Run incrementally after
      each wave and before final merge.

output:
  location: "output/distillation-v3/"
  per_batch: "batch_{NNN}.csv"
  batch_marker: "batch_{NNN}.done"
  merged: "output/distillation-v3/merged_labels.csv"
  schema:
    - name: "source"
      type: "string"
      description: "Dataset source: sherlock | sotab | gittables | eval"
    - name: "source_file"
      type: "string"
      description: "Source filename or identifier"
    - name: "column_name"
      type: "string"
      description: "Column header from source data (empty for Sherlock)"
    - name: "sample_values"
      type: "string"
      description: "JSON array of up to 20 sample values"
    - name: "blind_label"
      type: "string"
      description: "Claude's independent classification (must be valid taxonomy key)"
    - name: "blind_confidence"
      type: "string"
      description: "high | medium | low"
    - name: "finetype_label"
      type: "string"
      description: "FineType's column-level prediction via CLI"
    - name: "agreement"
      type: "string"
      description: "yes | no"
    - name: "final_label"
      type: "string"
      description: "Adjudicated label (blind_label if agree, reasoned choice if not)"
    - name: "reasoning"
      type: "string"
      description: "Brief explanation when disagreement (empty if agree)"
    - name: "ground_truth_label"
      type: "string"
      description: "External ground truth if available (Sherlock type, Schema.org type, or empty)"
    - name: "ground_truth_source"
      type: "string"
      description: "Source of ground truth: sherlock | sotab | eval_manifest | empty"

  supplementary:
    - "output/distillation-v3/sherlock_type_mapping.csv — 78→250 type mapping"
    - "output/distillation-v3/sotab_type_mapping.csv — Schema.org→FineType mapping"
    - "output/distillation-v3/gap_analysis.md — per-weakness disagreement breakdown"

acceptance_criteria:
  - "All four datasets distilled with merged_labels.csv containing source column"
  - "Sherlock: test split (137K columns) distilled with three-way comparison available"
  - "SOTAB: Round 2 CTA tables (44K) extracted and distilled, or deferred with documented reason"
  - "GitTables: 50 files per topic (~4,700 files, ~50K columns) extracted and distilled"
  - "Eval CSVs: all 27 files distilled"
  - "Invalid label rate <5% across all datasets (validated by scripts/validate_distillation.py)"
  - "Per-dataset agreement rates computed and reported"
  - "Sherlock→FineType type mapping reviewed by Hugh, coverage gaps identified"
  - "Disagreement breakdown by PR-2 weakness category via post-merge tagging script"
  - "Data sufficient to run rescore_distillation.py for PR-2 before/after comparison"
  - "Per-batch CSVs committed to branch — no output exists only on local disk"

evaluation_principles:
  - principle: "Coverage (proportion of target data successfully distilled)"
    weight: 0.30
  - principle: "Classification quality (invalid label rate, confidence distribution)"
    weight: 0.25
  - principle: "Weakness signal (disagreements map to known PR-2 fix categories)"
    weight: 0.25
  - principle: "Benchmark alignment (FineType vs external ground truth accuracy)"
    weight: 0.20

exit_conditions:
  - "All four datasets distilled with merged output"
  - "OR: Token budget exhausted — partial results saved and committed, resume on next reset"
  - "OR: Extraction step reveals dataset is unsuitable (corrupt, format mismatch)"

resolved_from_review:
  - question: "Sherlock columns have no header"
    resolution: >
      Empty header, intentional. Measures value-only classification strength.
      Reducing reliance on header hints is a strategic goal. Document in results
      that Sherlock comparison reflects headerless inference.
  - question: "Token budget for 687K Sherlock columns"
    resolution: >
      Distill test split first (137K columns, standard benchmark partition).
      Expand to train+val (549K) if token budget allows after SOTAB + GitTables.
  - question: "GitTables scope"
    resolution: >
      50 random files per topic, 94 topics (~4,700 files, ~50K columns).
      Deterministic seed for reproducibility.
  - question: "Durability of output"
    resolution: >
      Per-batch CSVs committed to branch after each wave. Batch completion
      tracked via .done markers. Merge step separate from agent loop.
  - question: "Label validation"
    resolution: >
      Post-merge validation script checks all labels against taxonomy key list.
      Run incrementally after each wave.
  - question: "Resume integrity"
    resolution: >
      .done marker files written atomically after CSV validation. Skip logic
      checks marker, not CSV existence.
  - question: "Type mapping methodology"
    resolution: >
      LLM-assisted draft, reviewed and finalised by Hugh. Unmapped types
      expected and counted in gap analysis.

open_questions:
  - "Whether to distill Sherlock train+val after test (depends on remaining token budget)"
  - "How to structure eval suite update after distillation (deferred per interview)"
  - "Schema.org→FineType type mapping complexity (82 Schema.org types, many won't map)"
  - "SOTAB JSON table internal format — validated during extraction step"

