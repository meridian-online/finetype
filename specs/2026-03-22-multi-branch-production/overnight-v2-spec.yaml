  interview_ref: "specs/2026-03-22-multi-branch-production/interview-overnight-v2.md"
  parent_spec: "specs/2026-03-22-multi-branch-production/spec.yaml"
  risk_tier: "STANDARD"
  implements_milestones: [M-3, M-4, M-5, M-6]
  review_ref: "specs/2026-03-22-multi-branch-production/review-overnight-v2-spec.md"
  divergences:
    - from: "Parent spec M-7 (conditional hierarchical)"
      rationale: >
        Trains hierarchical unconditionally in the same overnight run.
        Overnight compute is cheap; having both numbers avoids a second
        iteration. Hierarchical results are exploratory, not gating.
