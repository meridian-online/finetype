# Schema.org / DBpedia → FineType Type Mapping
# =============================================================================
# Machine-readable mapping for automated evaluation scoring.
#
# Sources:
#   - schema_labels.csv: 59 schema.org annotation labels
#   - dbpedia_labels.csv: 122 DBpedia ontology annotation labels
#   - Combined unique labels: 181 (some labels appear in both sources)
#
# Match quality levels:
#   direct    — GT label maps 1:1 to a FineType label (same concept, same format)
#   close     — GT label maps to a FineType label with minor semantic gap
#   partial   — GT label sometimes maps to a FineType label depending on data format
#   semantic_only — GT label describes meaning, not format; no FineType equivalent
#
# Taxonomy expansion flags:
#   expand: true  — GT label has reproducible format patterns worth adding to taxonomy
#   expand: false — GT label is purely semantic or already well-covered
#
# Usage:
#   Load this file in eval pipelines to score FineType predictions against GT labels.
#   A prediction is "correct" if finetype_label matches OR finetype_domain matches.
#
# Schema: Each entry has:
#   gt_label:        Ground truth annotation label (lowercase, as in metadata)
#   source:          schema | dbpedia | both
#   finetype_label:  Best matching FineType label, or null if semantic-only
#   finetype_domain: Expected FineType domain for domain-level accuracy
#   match_quality:   direct | close | partial | semantic_only
#   expand:          Whether this GT concept could become a FineType type
#   notes:           Explanation of the mapping decision

mappings:

