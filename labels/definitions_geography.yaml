# FineType v2 — Geography Domain Definitions
#
# Hierarchy: domain.category.type (locale is a field, not in the key)
# Full label at inference time: domain.category.type.LOCALE
#
# Each definition is a transformation contract:
#   - broad_type:     Target DuckDB type
#   - format_string:  DuckDB strptime format (null if not strptime-based)
#   - transform:      DuckDB SQL expression ({col} = column placeholder)
#   - transform_ext:  Enhanced transform requiring a DuckDB extension
#   - validation:     JSON Schema fragment for data quality checks
#   - tier:           Path from root to parent in the inference graph
#   - decompose:      Optional struct expansion for multi-field output
#
# Geography domain covers:
#   - locations (cities, countries, regions)
#   - addresses (street addresses, postal codes)
#   - coordinates (latitude, longitude, geographic features)
#   - airport/transportation codes (IATA, ICAO)
# ─────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: location
#
# Geographic location names and identifiers (countries, cities, regions).
# Locale-specific due to country/city name representation variations.
# ═════════════════════════════════════════════════════════════════════

geography.location.country:
  title: "Country Name"
  description: >
    Country name in English or local language. Locale-specific due to
    name representation (e.g., "Germany" in English vs "Deutschland" in German).
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 2
    maxLength: 100
  tier: [VARCHAR, location]
  release_priority: 4
  aliases: [country_name]
  samples:
    - "United States"
    - "France"
    - "Japan"
    - "Germany"
    - "Canada"
  references: null
  notes: >
    v1 migration: Was address.country. Locale-specific for country name
    representation across languages. Consider ISO 3166-1 for standardization.

geography.location.country_code:
  title: "Country Code"
  description: >
    ISO 3166-1 alpha-2 country code (2 letters, e.g., US, FR, JP).
    Universal format.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{2}$"
  tier: [VARCHAR, location]
  release_priority: 5
  aliases: [iso_3166_1_alpha_2]
  samples:
    - "US"
    - "FR"
    - "JP"
    - "DE"
    - "CA"
  references: null
  notes: >
    v1 migration: Was address.country_code. Transform uppercases.
    ISO 3166-1 alpha-2 standard (2 letters).

geography.location.continent:
  title: "Continent Name"
  description: >
    Name of geographic continent (Africa, Asia, Europe, North America,
    South America, Oceania, Antarctica). Locale-specific.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    enum:
      - Africa
      - Asia
      - Europe
      - North America
      - South America
      - Oceania
      - Antarctica
  tier: [VARCHAR, location]
  release_priority: 3
  aliases: null
  samples:
    - "North America"
    - "Europe"
    - "Asia"
    - "Africa"
  references: null
  notes: >
    v1 migration: Was address.continent. Locale-specific for continent name
    representation. 7-continent model shown in enum.

geography.location.region:
  title: "Region / State"
  description: >
    Subdivision of a country (state, province, region). Locale-specific
    due to regional name conventions.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 2
    maxLength: 100
  tier: [VARCHAR, location]
  release_priority: 3
  aliases: [state, province, subdivision]
  samples:
    - "California"
    - "Texas"
    - "Ontario"
    - "Bavaria"
    - "Île-de-France"
  references: null
  notes: >
    v1 migration: Was address.subdivision and address.state. Alias covers
    regional naming conventions. Locale-specific due to regional name
    representation across languages.

geography.location.city:
  title: "City Name"
  description: >
    Name of a city, town, or municipality. Locale-specific due to city
    name representation in different languages.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, PT_BR, RU, JA, ZH, KO, AR, HI, TR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 1
    maxLength: 100
  tier: [VARCHAR, location]
  release_priority: 4
  aliases: [municipality, town]
  samples:
    - "New York"
    - "San Francisco"
    - "London"
    - "Tokyo"
    - "Paris"
  references: null
  notes: >
    v1 migration: Was address.city. Locale-specific for city name representation.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: address
#
# Full and component-level street address information.
# Locale-specific due to address format conventions (street first vs last).
# ═════════════════════════════════════════════════════════════════════

geography.address.full_address:
  title: "Full Address"
  description: >
    Complete street address (number, street, city, postal code, country).
    Format and order locale-specific. May include apartment/suite numbers.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    street_number: "REGEXP_EXTRACT({col}, '^([0-9]+)')"
    street_name: "REGEXP_EXTRACT({col}, '^[0-9]+\\s+(.+?),?\\s+(?:[0-9]{5})?')"
    city: "REGEXP_EXTRACT({col}, '([A-Z][a-z]+)(?:,|$)')"
  validation:
    type: string
    minLength: 10
    maxLength: 500
  tier: [VARCHAR, address]
  release_priority: 3
  aliases: [address, street_address]
  samples:
    - "123 Main Street, New York, NY 10001, USA"
    - "456 Oxford Street, London, W1C 1AX, UK"
    - "789 Rue de Rivoli, Paris, 75004, France"
  references: null
  notes: >
    v1 migration: Was address.address. Locale-specific for address format
    (US format vs European format, etc.). Decompose extracts components but
    requires more sophisticated parsing for reliability.

# geography.address.street_number: REMOVED in v0.5.2 (NNFT-192)
# Indistinguishable from plain integers. Values fall to integer_number or alphanumeric_id.

geography.address.street_name:
  title: "Street Name"
  description: >
    Name of the street (e.g., Main Street, Oxford Street).
    May include street type (Street, Avenue, Boulevard, etc.).
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 2
    maxLength: 100
  tier: [VARCHAR, address]
  release_priority: 3
  aliases: [road]
  samples:
    - "Main Street"
    - "Oxford Street"
    - "Fifth Avenue"
    - "Rue de Rivoli"
  references: null
  notes: >
    v1 migration: Was address.street_name. Locale-specific.
    May or may not include street type suffix (St, Ave, Blvd, etc.).

geography.address.street_suffix:
  title: "Street Suffix"
  description: >
    Street type abbreviation or suffix (St, Ave, Blvd, Rd, Ln, Way, Ct, Dr, etc.).
    Locale-specific.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    enum:
      - Street
      - St
      - Avenue
      - Ave
      - Boulevard
      - Blvd
      - Road
      - Rd
      - Lane
      - Ln
      - Way
      - Court
      - Ct
      - Drive
      - Dr
      - Circle
      - Place
      - Plaza
      - Square
  tier: [VARCHAR, address]
  release_priority: 2
  aliases: [street_type]
  samples:
    - "Street"
    - "Avenue"
    - "Boulevard"
    - "Road"
  references: null
  notes: >
    v1 migration: Was address.street_suffix. Locale-specific for suffix naming
    and abbreviation conventions.

geography.address.postal_code:
  title: "Postal Code"
  description: >
    Postal code or ZIP code for mail delivery. Format varies by country:
    US ZIP codes (5 digits or ZIP+4), UK postcodes (alphanumeric), etc.
    Locale-specific format.
  designation: locale_specific
  locales: [
    EN, EN_AU, EN_GB, EN_CA, EN_US, EN_IE, EN_NZ, EN_SG, EN_PH, EN_NG, EN_KE,
    DE, DE_AT, DE_CH,
    FR,
    ES, ES_MX, ES_AR, ES_CL, ES_CO, ES_PE,
    IT,
    NL, NL_BE,
    PL, PT, PT_BR,
    RU, UA,
    JA, ZH, ZH_TW, KO,
    SV, NB, DA, FI, IS,
    TR, HE, EL,
    AR_SA, AR_EG, AR_MA,
    ZA, NG,
    HI, UR, BN,
    TH, MS, ID, VI,
    CS, HU, RO, BG, HR, SK, SL, LT, LV, ET, SR,
    LU, MT
  ]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    first_part: "REGEXP_EXTRACT({col}, '^([0-9A-Z]+)')"
  validation:
    type: string
    minLength: 3
    maxLength: 10
    maximum: 99999
  # Per-locale postal code patterns sourced from Google libaddressinput
  # (Apache 2.0). Each locale entry is a full Validation struct supporting
  # pattern, minLength, maxLength, minimum, maximum, and enum keywords.
  # See data/cldr/README.md for attribution and refresh instructions.
  validation_by_locale:
    # ── English-speaking locales ──────────────────────────────────────
    EN_US:
      type: string
      pattern: "^(\\d{5})(?:[ \\-](\\d{4}))?$"
      minLength: 5
      maxLength: 10
    EN_GB:
      type: string
      pattern: "^[A-Z]{1,2}\\d[A-Z\\d]?\\s?\\d[A-Z]{2}$"
      minLength: 5
      maxLength: 8
    EN_AU:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    EN_CA:
      type: string
      pattern: "^[ABCEGHJKLMNPRSTVXY]\\d[ABCEGHJ-NPRSTV-Z] ?\\d[ABCEGHJ-NPRSTV-Z]\\d$"
      minLength: 6
      maxLength: 7
    EN_IE:
      type: string
      pattern: "^[\\dA-Z]{3} ?[\\dA-Z]{4}$"
      minLength: 7
      maxLength: 8
    EN_NZ:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    EN_SG:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    EN_PH:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    EN_NG:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    EN_KE:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── German-speaking locales ───────────────────────────────────────
    DE:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    DE_AT:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    DE_CH:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    # ── French ────────────────────────────────────────────────────────
    FR:
      type: string
      pattern: "^\\d{2} ?\\d{3}$"
      minLength: 5
      maxLength: 6
    # ── Spanish-speaking locales ──────────────────────────────────────
    ES:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    ES_MX:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    ES_AR:
      type: string
      pattern: "^([A-HJ-NP-Z])?\\d{4}([A-Z]{3})?$"
      minLength: 4
      maxLength: 8
    ES_CL:
      type: string
      pattern: "^\\d{7}$"
      minLength: 7
      maxLength: 7
    ES_CO:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    ES_PE:
      type: string
      pattern: "^(?:LIMA \\d{1,2}|CALLAO 0?\\d|[0-2]\\d{4})$"
      minLength: 5
      maxLength: 8
    # ── Italian ───────────────────────────────────────────────────────
    IT:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── Dutch-speaking locales ────────────────────────────────────────
    NL:
      type: string
      pattern: "^[1-9]\\d{3} ?(?:[A-RT-Z][A-Z]|S[BCE-RT-Z])$"
      minLength: 6
      maxLength: 7
    NL_BE:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    # ── Polish ────────────────────────────────────────────────────────
    PL:
      type: string
      pattern: "^\\d{2}-\\d{3}$"
      minLength: 6
      maxLength: 6
    # ── Portuguese-speaking locales ───────────────────────────────────
    PT:
      type: string
      pattern: "^\\d{4}-\\d{3}$"
      minLength: 8
      maxLength: 8
    PT_BR:
      type: string
      pattern: "^\\d{5}-?\\d{3}$"
      minLength: 8
      maxLength: 9
    # ── Eastern European / Slavic locales ─────────────────────────────
    RU:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    UA:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    CS:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    HU:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    RO:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    BG:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    HR:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    SK:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    SL:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    SR:
      type: string
      pattern: "^\\d{5,6}$"
      minLength: 5
      maxLength: 6
    # ── Baltic locales ────────────────────────────────────────────────
    LT:
      type: string
      pattern: "^(?:LT-)?\\d{5}$"
      minLength: 5
      maxLength: 8
    LV:
      type: string
      pattern: "^LV-\\d{4}$"
      minLength: 7
      maxLength: 7
    ET:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── East Asian locales ────────────────────────────────────────────
    JA:
      type: string
      pattern: "^\\d{3}-?\\d{4}$"
      minLength: 7
      maxLength: 8
    ZH:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    ZH_TW:
      type: string
      pattern: "^\\d{3}(?:\\d{2,3})?$"
      minLength: 3
      maxLength: 6
    KO:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── Nordic locales ────────────────────────────────────────────────
    SV:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    NB:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    DA:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    FI:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    IS:
      type: string
      pattern: "^\\d{3}$"
      minLength: 3
      maxLength: 3
    # ── Middle Eastern locales ────────────────────────────────────────
    TR:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    HE:
      type: string
      pattern: "^\\d{5}(?:\\d{2})?$"
      minLength: 5
      maxLength: 7
    EL:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    AR_SA:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    AR_EG:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    AR_MA:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── African locales ───────────────────────────────────────────────
    ZA:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    NG:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    # ── South Asian locales ───────────────────────────────────────────
    HI:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    UR:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    BN:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    # ── Southeast Asian locales ───────────────────────────────────────
    TH:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    MS:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    ID:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    VI:
      type: string
      pattern: "^\\d{5,6}$"
      minLength: 5
      maxLength: 6
    # ── Small European locales ────────────────────────────────────────
    LU:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    MT:
      type: string
      pattern: "^[A-Z]{3} ?\\d{2,4}$"
      minLength: 5
      maxLength: 8
  tier: [VARCHAR, address]
  release_priority: 4
  aliases: [zip_code, postcode]
  samples:
    - "10001"
    - "75004"
    - "W1C 1AX"
    - "EC1A 1BB"
  references: null
  notes: >
    v1 migration: Was address.postal_code (and address.zip_code).
    Highly locale-specific: US (5-9 digits), UK (6-7 alphanumeric), DE (5 digits),
    FR (5 digits), etc.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: coordinate
#
# Geographic coordinates (latitude, longitude) and precise location data.
# ═════════════════════════════════════════════════════════════════════

geography.coordinate.latitude:
  title: "Latitude"
  description: >
    Latitude coordinate in decimal degrees (-90 to +90).
    North is positive, South is negative.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DOUBLE
  format_string: null
  transform: "CAST({col} AS DOUBLE)"
  transform_ext: null
  decompose: null
  validation:
    type: number
    minimum: -90
    maximum: 90
  tier: [DOUBLE, coordinate]
  release_priority: 4
  aliases: [lat]
  samples:
    - "40.7128"
    - "-33.8688"
    - "51.5074"
    - "35.6762"
  references: null
  notes: >
    v1 migration: Was address.latitude. Decimal degrees format.
    Range: -90 (South Pole) to +90 (North Pole).
    COLUMN_MODE_DISAMBIGUATION_TARGET: latitude vs longitude.
    Single-value ambiguous when |value| <= 90 (overlapping range).
    Column-mode: if all values in [-90, 90] → latitude; if any |value| > 90 → longitude.

geography.coordinate.longitude:
  title: "Longitude"
  description: >
    Longitude coordinate in decimal degrees (-180 to +180).
    East is positive, West is negative.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DOUBLE
  format_string: null
  transform: "CAST({col} AS DOUBLE)"
  transform_ext: null
  decompose: null
  validation:
    type: number
    minimum: -180
    maximum: 180
  tier: [DOUBLE, coordinate]
  release_priority: 4
  aliases: [lon, long]
  samples:
    - "-74.0060"
    - "151.2093"
    - "-0.1278"
    - "139.6917"
  references: null
  notes: >
    v1 migration: Was address.longitude. Decimal degrees format.
    Range: -180 (West) to +180 (East).
    COLUMN_MODE_DISAMBIGUATION_TARGET: latitude vs longitude.
    Column-mode: if any |value| > 90 → longitude (latitude max is 90).

geography.coordinate.coordinates:
  title: "Coordinate Pair (Lat, Lon)"
  description: >
    Latitude and longitude as a pair, formatted as "lat,lon" or "lat lon".
    May include degree/minute/second notation or decimal degrees.
    Transforms to POINT geometry (requires spatial extension).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: POINT
  format_string: null
  transform: "ST_Point({col}::DOUBLE, CAST(REGEXP_EXTRACT({col}, ',([^,]+)') AS DOUBLE))"
  transform_ext: "ST_GeogPoint(CAST(REGEXP_EXTRACT({col}, '^([^,]+)') AS DOUBLE), CAST(REGEXP_EXTRACT({col}, ',([^,]+)') AS DOUBLE))"
  decompose:
    latitude: "CAST(REGEXP_EXTRACT({col}, '^([^,]+)') AS DOUBLE)"
    longitude: "CAST(REGEXP_EXTRACT({col}, ',([^,]+)') AS DOUBLE)"
  validation:
    type: string
    pattern: "^-?[0-9]+(\\.[0-9]+)?[, ]-?[0-9]+(\\.[0-9]+)?$"
  tier: [POINT, coordinate]
  release_priority: 3
  aliases: [lat_lon, location]
  samples:
    - "40.7128,-74.0060"
    - "51.5074,-0.1278"
    - "35.6762 139.6917"
  references: null
  notes: >
    v1 migration: Was address.coordinates. Spatial extension required for
    POINT type (DuckDB spatial). Decompose extracts lat and lon separately.
    Format: "lat,lon" or "lat lon".

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: transportation
#
# Codes for airports and transportation facilities.
# ═════════════════════════════════════════════════════════════════════

geography.transportation.iata_code:
  title: "IATA Airport Code"
  description: >
    International Air Transport Association airport code (3 letters).
    Identifies airports for flight bookings and schedules (e.g., JFK, LAX, CDG).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{3}$"
  tier: [VARCHAR, transportation]
  release_priority: 4
  aliases: null
  samples:
    - "JFK"
    - "LAX"
    - "CDG"
    - "LHR"
    - "NRT"
  references: null
  notes: >
    v1 migration: Was address.iata_code. Transform uppercases.
    3-letter code. Examples: JFK (New York), LAX (Los Angeles), CDG (Paris),
    LHR (London), NRT (Tokyo).

geography.transportation.icao_code:
  title: "ICAO Airport Code"
  description: >
    International Civil Aviation Organization airport code (4 letters).
    More comprehensive than IATA; includes some smaller airports
    (e.g., KJFK, KLAX, LFPG).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{4}$"
  tier: [VARCHAR, transportation]
  release_priority: 3
  aliases: null
  samples:
    - "KJFK"
    - "KLAX"
    - "LFPG"
    - "EGLL"
    - "RJTT"
  references: null
  notes: >
    v1 migration: Was address.icao_code. Transform uppercases.
    4-letter code. Examples: KJFK (New York), KLAX (Los Angeles),
    LFPG (Paris), EGLL (London), RJTT (Tokyo).

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: contact
#
# Contact and communication-related geographic information.
# ═════════════════════════════════════════════════════════════════════

geography.contact.calling_code:
  title: "International Calling Code"
  description: >
    International dialing code for a country (e.g., +1 for USA/Canada,
    +44 for UK, +33 for France). May include +, may not.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    code: "REGEXP_EXTRACT({col}, '\\+?([0-9]+)')"
  validation:
    type: string
    pattern: "^\\+?[0-9]{1,4}$"
  validation_by_locale:
    # Source: ITU-T E.164 country calling codes (public domain)
    # Each locale validates the specific calling code(s) for that country/region.
    # Optional + prefix, exact digit match. (NNFT-141)
    EN:
      type: string
      pattern: "^\\+?1$"
    EN_US:
      type: string
      pattern: "^\\+?1$"
    EN_CA:
      type: string
      pattern: "^\\+?1$"
    EN_GB:
      type: string
      pattern: "^\\+?44$"
    EN_AU:
      type: string
      pattern: "^\\+?61$"
    DE:
      type: string
      pattern: "^\\+?49$"
    FR:
      type: string
      pattern: "^\\+?33$"
    ES:
      type: string
      pattern: "^\\+?34$"
    IT:
      type: string
      pattern: "^\\+?39$"
    NL:
      type: string
      pattern: "^\\+?31$"
    PL:
      type: string
      pattern: "^\\+?48$"
    RU:
      type: string
      pattern: "^\\+?7$"
    JA:
      type: string
      pattern: "^\\+?81$"
    ZH:
      type: string
      pattern: "^\\+?86$"
    KO:
      type: string
      pattern: "^\\+?82$"
    AR:
      type: string
      pattern: "^\\+?966$"
    ZA:
      type: string
      pattern: "^\\+?27$"
  tier: [VARCHAR, contact]
  release_priority: 3
  aliases: [isd_code, country_code]
  samples:
    - "+1"
    - "+44"
    - "+33"
    - "+81"
    - "1"
  references: null
  notes: >
    v1 migration: Was address.calling_code (also aliased to address.isd_code).
    May include +, may not. Locale-specific for country association.
    Range: 1-4 digits.

