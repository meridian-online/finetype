# FineType v2 — Geography Domain Definitions
#
# Hierarchy: domain.category.type (locale is a field, not in the key)
# Full label at inference time: domain.category.type.LOCALE
#
# Each definition is a transformation contract:
#   - broad_type:     Target DuckDB type
#   - format_string:  DuckDB strptime format (null if not strptime-based)
#   - transform:      DuckDB SQL expression ({col} = column placeholder)
#   - transform_ext:  Enhanced transform requiring a DuckDB extension
#   - validation:     JSON Schema fragment for data quality checks
#   - tier:           Path from root to parent in the inference graph
#   - decompose:      Optional struct expansion for multi-field output
#
# Geography domain covers:
#   - locations (cities, countries, regions)
#   - addresses (street addresses, postal codes)
#   - coordinates (latitude, longitude, geographic features)
#   - airport/transportation codes (IATA, ICAO)
# ─────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: location
#
# Geographic location names and identifiers (countries, cities, regions).
# Locale-specific due to country/city name representation variations.
# ═════════════════════════════════════════════════════════════════════

geography.location.country:
  title: "Country Name"
  description: >
    Country name in English or local language. Locale-specific due to
    name representation (e.g., "Germany" in English vs "Deutschland" in German).
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 2
    maxLength: 100
  tier: [VARCHAR, location]
  release_priority: 4
  aliases: [country_name]
  samples:
    - "United States"
    - "France"
    - "Japan"
    - "Germany"
    - "Canada"
  references: null
  notes: >
    v1 migration: Was address.country. Locale-specific for country name
    representation across languages. Consider ISO 3166-1 for standardization.

geography.location.country_code:
  title: "Country Code"
  description: >
    ISO 3166-1 alpha-2 country code (2 letters, e.g., US, FR, JP).
    Universal format.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{2}$"
  tier: [VARCHAR, location]
  release_priority: 5
  aliases: [iso_3166_1_alpha_2]
  samples:
    - "US"
    - "FR"
    - "JP"
    - "DE"
    - "CA"
  references: null
  notes: >
    v1 migration: Was address.country_code. Transform uppercases.
    ISO 3166-1 alpha-2 standard (2 letters).

geography.location.continent:
  title: "Continent Name"
  description: >
    Name of geographic continent (Africa, Asia, Europe, North America,
    South America, Oceania, Antarctica). Locale-specific.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    enum:
      - Africa
      - Asia
      - Europe
      - North America
      - South America
      - Oceania
      - Antarctica
  tier: [VARCHAR, location]
  release_priority: 3
  aliases: null
  samples:
    - "North America"
    - "Europe"
    - "Asia"
    - "Africa"
  references: null
  notes: >
    v1 migration: Was address.continent. Locale-specific for continent name
    representation. 7-continent model shown in enum.

geography.location.region:
  title: "Region / State"
  description: >
    Subdivision of a country (state, province, region). Locale-specific
    due to regional name conventions.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 2
    maxLength: 100
  tier: [VARCHAR, location]
  release_priority: 3
  aliases: [state, province, subdivision]
  samples:
    - "California"
    - "Texas"
    - "Ontario"
    - "Bavaria"
    - "Île-de-France"
  references: null
  notes: >
    v1 migration: Was address.subdivision and address.state. Alias covers
    regional naming conventions. Locale-specific due to regional name
    representation across languages.

geography.location.city:
  title: "City Name"
  description: >
    Name of a city, town, or municipality. Locale-specific due to city
    name representation in different languages.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, PT_BR, RU, JA, ZH, KO, AR, HI, TR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 1
    maxLength: 100
  tier: [VARCHAR, location]
  release_priority: 4
  aliases: [municipality, town]
  samples:
    - "New York"
    - "San Francisco"
    - "London"
    - "Tokyo"
    - "Paris"
  references: null
  notes: >
    v1 migration: Was address.city. Locale-specific for city name representation.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: address
#
# Full and component-level street address information.
# Locale-specific due to address format conventions (street first vs last).
# ═════════════════════════════════════════════════════════════════════

geography.address.full_address:
  title: "Full Address"
  description: >
    Complete street address (number, street, city, postal code, country).
    Format and order locale-specific. May include apartment/suite numbers.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    street_number: "REGEXP_EXTRACT({col}, '^([0-9]+)')"
    street_name: "REGEXP_EXTRACT({col}, '^[0-9]+\\s+(.+?),?\\s+(?:[0-9]{5})?')"
    city: "REGEXP_EXTRACT({col}, '([A-Z][a-z]+)(?:,|$)')"
  validation:
    type: string
    minLength: 10
    maxLength: 500
  tier: [VARCHAR, address]
  release_priority: 3
  aliases: [address, street_address]
  samples:
    - "123 Main Street, New York, NY 10001, USA"
    - "456 Oxford Street, London, W1C 1AX, UK"
    - "789 Rue de Rivoli, Paris, 75004, France"
  references: null
  notes: >
    v1 migration: Was address.address. Locale-specific for address format
    (US format vs European format, etc.). Decompose extracts components but
    requires more sophisticated parsing for reliability.
  pii: true

# geography.address.street_number: REMOVED in v0.5.2 (NNFT-192)
# Indistinguishable from plain integers. Values fall to integer_number or alphanumeric_id.

geography.address.street_name:
  title: "Street Name"
  description: >
    Name of the street (e.g., Main Street, Oxford Street).
    May include street type (Street, Avenue, Boulevard, etc.).
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 2
    maxLength: 100
  tier: [VARCHAR, address]
  release_priority: 3
  aliases: [road]
  samples:
    - "Main Street"
    - "Oxford Street"
    - "Fifth Avenue"
    - "Rue de Rivoli"
  references: null
  notes: >
    v1 migration: Was address.street_name. Locale-specific.
    May or may not include street type suffix (St, Ave, Blvd, etc.).

geography.address.street_suffix:
  title: "Street Suffix"
  description: >
    Street type abbreviation or suffix (St, Ave, Blvd, Rd, Ln, Way, Ct, Dr, etc.).
    Locale-specific.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    enum:
      - Street
      - St
      - Avenue
      - Ave
      - Boulevard
      - Blvd
      - Road
      - Rd
      - Lane
      - Ln
      - Way
      - Court
      - Ct
      - Drive
      - Dr
      - Circle
      - Place
      - Plaza
      - Square
  tier: [VARCHAR, address]
  release_priority: 3
  aliases: [street_type]
  samples:
    - "Street"
    - "Avenue"
    - "Boulevard"
    - "Road"
  references: null
  notes: >
    v1 migration: Was address.street_suffix. Locale-specific for suffix naming
    and abbreviation conventions.

geography.address.postal_code:
  title: "Postal Code"
  description: >
    Postal code or ZIP code for mail delivery. Format varies by country:
    US ZIP codes (5 digits or ZIP+4), UK postcodes (alphanumeric), etc.
    Locale-specific format.
  designation: locale_specific
  locales: [
    EN, EN_AU, EN_GB, EN_CA, EN_US, EN_IE, EN_NZ, EN_SG, EN_PH, EN_NG, EN_KE,
    DE, DE_AT, DE_CH,
    FR,
    ES, ES_MX, ES_AR, ES_CL, ES_CO, ES_PE,
    IT,
    NL, NL_BE,
    PL, PT, PT_BR,
    RU, UA,
    JA, ZH, ZH_TW, KO,
    SV, NB, DA, FI, IS,
    TR, HE, EL,
    AR_SA, AR_EG, AR_MA,
    ZA, NG,
    HI, UR, BN,
    TH, MS, ID, VI,
    CS, HU, RO, BG, HR, SK, SL, LT, LV, ET, SR,
    LU, MT
  ]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    first_part: "REGEXP_EXTRACT({col}, '^([0-9A-Z]+)')"
  validation:
    type: string
    minLength: 3
    maxLength: 10
    maximum: 99999
  # Per-locale postal code patterns sourced from Google libaddressinput
  # (Apache 2.0). Each locale entry is a full Validation struct supporting
  # pattern, minLength, maxLength, minimum, maximum, and enum keywords.
  # See data/cldr/README.md for attribution and refresh instructions.
  validation_by_locale:
    # ── English-speaking locales ──────────────────────────────────────
    EN_US:
      type: string
      pattern: "^(\\d{5})(?:[ \\-](\\d{4}))?$"
      minLength: 5
      maxLength: 10
    EN_GB:
      type: string
      pattern: "^[A-Z]{1,2}\\d[A-Z\\d]?\\s?\\d[A-Z]{2}$"
      minLength: 5
      maxLength: 8
    EN_AU:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    EN_CA:
      type: string
      pattern: "^[ABCEGHJKLMNPRSTVXY]\\d[ABCEGHJ-NPRSTV-Z] ?\\d[ABCEGHJ-NPRSTV-Z]\\d$"
      minLength: 6
      maxLength: 7
    EN_IE:
      type: string
      pattern: "^[\\dA-Z]{3} ?[\\dA-Z]{4}$"
      minLength: 7
      maxLength: 8
    EN_NZ:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    EN_SG:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    EN_PH:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    EN_NG:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    EN_KE:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── German-speaking locales ───────────────────────────────────────
    DE:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    DE_AT:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    DE_CH:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    # ── French ────────────────────────────────────────────────────────
    FR:
      type: string
      pattern: "^\\d{2} ?\\d{3}$"
      minLength: 5
      maxLength: 6
    # ── Spanish-speaking locales ──────────────────────────────────────
    ES:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    ES_MX:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    ES_AR:
      type: string
      pattern: "^([A-HJ-NP-Z])?\\d{4}([A-Z]{3})?$"
      minLength: 4
      maxLength: 8
    ES_CL:
      type: string
      pattern: "^\\d{7}$"
      minLength: 7
      maxLength: 7
    ES_CO:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    ES_PE:
      type: string
      pattern: "^(?:LIMA \\d{1,2}|CALLAO 0?\\d|[0-2]\\d{4})$"
      minLength: 5
      maxLength: 8
    # ── Italian ───────────────────────────────────────────────────────
    IT:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── Dutch-speaking locales ────────────────────────────────────────
    NL:
      type: string
      pattern: "^[1-9]\\d{3} ?(?:[A-RT-Z][A-Z]|S[BCE-RT-Z])$"
      minLength: 6
      maxLength: 7
    NL_BE:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    # ── Polish ────────────────────────────────────────────────────────
    PL:
      type: string
      pattern: "^\\d{2}-\\d{3}$"
      minLength: 6
      maxLength: 6
    # ── Portuguese-speaking locales ───────────────────────────────────
    PT:
      type: string
      pattern: "^\\d{4}-\\d{3}$"
      minLength: 8
      maxLength: 8
    PT_BR:
      type: string
      pattern: "^\\d{5}-?\\d{3}$"
      minLength: 8
      maxLength: 9
    # ── Eastern European / Slavic locales ─────────────────────────────
    RU:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    UA:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    CS:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    HU:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    RO:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    BG:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    HR:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    SK:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    SL:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    SR:
      type: string
      pattern: "^\\d{5,6}$"
      minLength: 5
      maxLength: 6
    # ── Baltic locales ────────────────────────────────────────────────
    LT:
      type: string
      pattern: "^(?:LT-)?\\d{5}$"
      minLength: 5
      maxLength: 8
    LV:
      type: string
      pattern: "^LV-\\d{4}$"
      minLength: 7
      maxLength: 7
    ET:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── East Asian locales ────────────────────────────────────────────
    JA:
      type: string
      pattern: "^\\d{3}-?\\d{4}$"
      minLength: 7
      maxLength: 8
    ZH:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    ZH_TW:
      type: string
      pattern: "^\\d{3}(?:\\d{2,3})?$"
      minLength: 3
      maxLength: 6
    KO:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── Nordic locales ────────────────────────────────────────────────
    SV:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    NB:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    DA:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    FI:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    IS:
      type: string
      pattern: "^\\d{3}$"
      minLength: 3
      maxLength: 3
    # ── Middle Eastern locales ────────────────────────────────────────
    TR:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    HE:
      type: string
      pattern: "^\\d{5}(?:\\d{2})?$"
      minLength: 5
      maxLength: 7
    EL:
      type: string
      pattern: "^\\d{3} ?\\d{2}$"
      minLength: 5
      maxLength: 6
    AR_SA:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    AR_EG:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    AR_MA:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    # ── African locales ───────────────────────────────────────────────
    ZA:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    NG:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    # ── South Asian locales ───────────────────────────────────────────
    HI:
      type: string
      pattern: "^\\d{6}$"
      minLength: 6
      maxLength: 6
    UR:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    BN:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    # ── Southeast Asian locales ───────────────────────────────────────
    TH:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    MS:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    ID:
      type: string
      pattern: "^\\d{5}$"
      minLength: 5
      maxLength: 5
    VI:
      type: string
      pattern: "^\\d{5,6}$"
      minLength: 5
      maxLength: 6
    # ── Small European locales ────────────────────────────────────────
    LU:
      type: string
      pattern: "^\\d{4}$"
      minLength: 4
      maxLength: 4
    MT:
      type: string
      pattern: "^[A-Z]{3} ?\\d{2,4}$"
      minLength: 5
      maxLength: 8
  tier: [VARCHAR, address]
  release_priority: 4
  aliases: [zip_code, postcode]
  samples:
    - "10001"
    - "75004"
    - "W1C 1AX"
    - "EC1A 1BB"
  references: null
  notes: >
    v1 migration: Was address.postal_code (and address.zip_code).
    Highly locale-specific: US (5-9 digits), UK (6-7 alphanumeric), DE (5 digits),
    FR (5 digits), etc.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: format
#
# Geospatial serialisation formats (WKT, GeoJSON).
# ═════════════════════════════════════════════════════════════════════

geography.format.wkt:
  title: "Well-Known Text Geometry"
  description: >
    OGC Well-Known Text (WKT) representation of geometry objects.
    Strings begin with a geometry type keyword (POINT, LINESTRING, POLYGON,
    MULTIPOINT, MULTILINESTRING, MULTIPOLYGON, GEOMETRYCOLLECTION) optionally
    followed by Z/M/ZM dimension suffix.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: "ST_GeomFromText({col})"
  decompose: null
  validation:
    type: string
    pattern: "^(POINT|LINESTRING|POLYGON|MULTI(POINT|LINESTRING|POLYGON)|GEOMETRYCOLLECTION)\\s*(Z|M|ZM)?\\s*(\\(|EMPTY)"
  tier: [VARCHAR, format]
  release_priority: 3
  aliases: [well_known_text]
  samples:
    - "POINT (30 10)"
    - "LINESTRING (30 10, 10 30, 40 40)"
    - "POLYGON ((30 10, 40 40, 20 40, 10 20, 30 10))"
    - "MULTIPOINT ((10 40), (40 30), (20 20), (30 10))"
    - "POINT EMPTY"
  references: null
  notes: >
    OGC Simple Features standard (ISO 19125). DuckDB spatial extension
    provides ST_GeomFromText for parsing.

geography.format.geojson:
  title: "GeoJSON Geometry"
  description: >
    RFC 7946 GeoJSON object. Valid JSON containing a "type" key whose value
    is one of: Point, LineString, Polygon, MultiPoint, MultiLineString,
    MultiPolygon, GeometryCollection, Feature, FeatureCollection.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: "ST_GeomFromGeoJSON({col})"
  decompose: null
  validation:
    type: string
    pattern: "^\\{\\s*\"type\"\\s*:\\s*\"(Point|LineString|Polygon|MultiPoint|MultiLineString|MultiPolygon|GeometryCollection|Feature|FeatureCollection)\""
  tier: [VARCHAR, format]
  release_priority: 3
  aliases: null
  samples:
    - '{"type": "Point", "coordinates": [125.6, 10.1]}'
    - '{"type": "LineString", "coordinates": [[102.0, 0.0], [103.0, 1.0]]}'
    - '{"type": "Polygon", "coordinates": [[[100.0, 0.0], [101.0, 0.0], [101.0, 1.0], [100.0, 1.0], [100.0, 0.0]]]}'
    - '{"type": "Feature", "geometry": {"type": "Point", "coordinates": [102.0, 0.5]}, "properties": {"name": "example"}}'
  references: null
  notes: >
    RFC 7946. DuckDB spatial extension provides ST_GeomFromGeoJSON for parsing.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: index
#
# Spatial indexing systems (H3, S2, etc.).
# ═════════════════════════════════════════════════════════════════════

geography.index.h3:
  title: "H3 Hex Index"
  description: >
    Uber H3 hierarchical hexagonal spatial index. A 15-character lowercase
    hexadecimal string encoding resolution (0-15) and cell position.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: "h3_cell_to_lat(h3_string_to_h3({col}))"
  decompose: null
  validation:
    type: string
    pattern: "^[0-9a-f]{15}$"
  tier: [VARCHAR, index]
  release_priority: 3
  aliases: [h3_index, h3_cell]
  samples:
    - "8928308280fffff"
    - "891f1d4c6c7ffff"
    - "8a2a1072b59ffff"
    - "872830828ffffff"
    - "8e28308280f0e4f"
  references: null
  notes: >
    Uber H3 geospatial indexing system. Resolution 0 (coarsest) to 15 (finest).
    DuckDB h3 extension provides conversion functions.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: coordinate
#
# Geographic coordinates (latitude, longitude) and precise location data.
# ═════════════════════════════════════════════════════════════════════

geography.coordinate.latitude:
  title: "Latitude"
  description: >
    Latitude coordinate in decimal degrees (-90 to +90).
    North is positive, South is negative.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DOUBLE
  format_string: null
  transform: "CAST({col} AS DOUBLE)"
  transform_ext: null
  decompose: null
  validation:
    type: number
    minimum: -90
    maximum: 90
  tier: [DOUBLE, coordinate]
  release_priority: 4
  aliases: [lat]
  samples:
    - "40.7128"
    - "-33.8688"
    - "51.5074"
    - "35.6762"
  references: null
  notes: >
    v1 migration: Was address.latitude. Decimal degrees format.
    Range: -90 (South Pole) to +90 (North Pole).
    COLUMN_MODE_DISAMBIGUATION_TARGET: latitude vs longitude.
    Single-value ambiguous when |value| <= 90 (overlapping range).
    Column-mode: if all values in [-90, 90] → latitude; if any |value| > 90 → longitude.

geography.coordinate.longitude:
  title: "Longitude"
  description: >
    Longitude coordinate in decimal degrees (-180 to +180).
    East is positive, West is negative.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DOUBLE
  format_string: null
  transform: "CAST({col} AS DOUBLE)"
  transform_ext: null
  decompose: null
  validation:
    type: number
    minimum: -180
    maximum: 180
  tier: [DOUBLE, coordinate]
  release_priority: 4
  aliases: [lon, long]
  samples:
    - "-74.0060"
    - "151.2093"
    - "-0.1278"
    - "139.6917"
  references: null
  notes: >
    v1 migration: Was address.longitude. Decimal degrees format.
    Range: -180 (West) to +180 (East).
    COLUMN_MODE_DISAMBIGUATION_TARGET: latitude vs longitude.
    Column-mode: if any |value| > 90 → longitude (latitude max is 90).

geography.coordinate.coordinates:
  title: "Coordinate Pair (Lat, Lon)"
  description: >
    Latitude and longitude as a pair, formatted as "lat,lon" or "lat lon".
    May include degree/minute/second notation or decimal degrees.
    Transforms to POINT geometry (requires spatial extension).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: POINT
  format_string: null
  transform: "ST_Point({col}::DOUBLE, CAST(REGEXP_EXTRACT({col}, ',([^,]+)') AS DOUBLE))"
  transform_ext: "ST_GeogPoint(CAST(REGEXP_EXTRACT({col}, '^([^,]+)') AS DOUBLE), CAST(REGEXP_EXTRACT({col}, ',([^,]+)') AS DOUBLE))"
  decompose:
    latitude: "CAST(REGEXP_EXTRACT({col}, '^([^,]+)') AS DOUBLE)"
    longitude: "CAST(REGEXP_EXTRACT({col}, ',([^,]+)') AS DOUBLE)"
  validation:
    type: string
    pattern: "^-?[0-9]+(\\.[0-9]+)?[, ]-?[0-9]+(\\.[0-9]+)?$"
  tier: [POINT, coordinate]
  release_priority: 3
  aliases: [lat_lon, location]
  samples:
    - "40.7128,-74.0060"
    - "51.5074,-0.1278"
    - "35.6762 139.6917"
  references: null
  notes: >
    v1 migration: Was address.coordinates. Spatial extension required for
    POINT type (DuckDB spatial). Decompose extracts lat and lon separately.
    Format: "lat,lon" or "lat lon".

geography.coordinate.geohash:
  title: "Geohash"
  description: >
    Base-32 encoded geographic area. 4-12 characters using the Geohash
    alphabet (0-9, b-h, j, k, m, n, p-z — excludes a, i, l, o).
    Longer strings represent smaller, more precise areas.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[0-9b-hjkmnp-z]{4,12}$"
  tier: [VARCHAR, coordinate]
  release_priority: 3
  aliases: null
  samples:
    - "9q8yyk8yuv"
    - "u4pruydqqvj"
    - "dr5ru7c02wnm"
    - "gbsuv7ztq"
    - "ezs42"
  references: null
  notes: >
    Invented by Gustavo Niemeyer. Public-domain algorithm. Each additional
    character divides the cell into 32 sub-cells.

geography.coordinate.plus_code:
  title: "Plus Code (Open Location Code)"
  description: >
    Google Open Location Code. 8 characters from the OLC alphabet followed
    by '+' and 2 or more refining characters. Encodes latitude/longitude
    into a short, human-readable string.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[23456789CFGHJMPQRVWX]{8}\\+[23456789CFGHJMPQRVWX]{2,}$"
  tier: [VARCHAR, coordinate]
  release_priority: 3
  aliases: [open_location_code]
  samples:
    - "849VCWC8+R9"
    - "87G8Q2PQ+QV"
    - "8FVC9G8F+6W"
    - "9F4MGC94+MC"
    - "7FG49W00+2V"
  references: null
  notes: >
    Google Open Location Code (github.com/google/open-location-code).
    Apache 2.0 licensed. 20-character alphabet: 23456789CFGHJMPQRVWX.

geography.coordinate.dms:
  title: "Degrees Minutes Seconds"
  description: >
    Geographic coordinates in degrees, minutes, and seconds with cardinal
    direction indicators. Format: D°M'S"N D°M'S"W (latitude then longitude).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    latitude_deg: "CAST(REGEXP_EXTRACT({col}, '^(\\d+)°') AS INTEGER)"
    latitude_min: "CAST(REGEXP_EXTRACT({col}, '°(\\d+)''') AS INTEGER)"
    longitude_deg: "CAST(REGEXP_EXTRACT({col}, '\\s+(\\d+)°') AS INTEGER)"
  validation:
    type: string
    pattern: "^\\d{1,3}°\\d{1,2}'\\d{1,2}(\\.\\d+)?\"[NS]\\s+\\d{1,3}°\\d{1,2}'\\d{1,2}(\\.\\d+)?\"[EW]$"
  tier: [VARCHAR, coordinate]
  release_priority: 3
  aliases: [degrees_minutes_seconds]
  samples:
    - "40°26'46\"N 79°58'56\"W"
    - "51°30'26\"N 0°07'39\"W"
    - "35°41'22\"N 139°41'30\"E"
    - "33°51'54\"S 151°12'36\"E"
    - "48°51'24\"N 2°21'07\"E"
  references: null
  notes: >
    Traditional geographic coordinate notation. Latitude (N/S) followed by
    longitude (E/W). Each component has degrees, arc-minutes, arc-seconds.

geography.coordinate.mgrs:
  title: "Military Grid Reference System"
  description: >
    NATO Military Grid Reference System coordinate. Composed of grid zone
    designator (1-2 digit zone number + latitude band letter C-X excluding
    I and O), 100km grid square (2 letters), and easting/northing digits
    (2-10 digits, equal halves).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^\\d{1,2}[C-X][A-HJ-NP-Z]{2}\\d{2,10}$"
  tier: [VARCHAR, coordinate]
  release_priority: 3
  aliases: null
  samples:
    - "18SUJ2348306479"
    - "33UUP0490171890"
    - "4QFJ1234567890"
    - "54SUE8765043210"
    - "32TQM5678901234"
  references: null
  notes: >
    Based on UTM and UPS grids. Used by NATO military forces. Zone 1-60,
    latitude band C-X (excluding I and O), grid square AA-ZZ (excluding
    I and O), precision 1m (10 digits) to 10km (2 digits).

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: transportation
#
# Codes for airports and transportation facilities.
# ═════════════════════════════════════════════════════════════════════

geography.transportation.iata_code:
  title: "IATA Airport Code"
  description: >
    International Air Transport Association airport code (3 letters).
    Identifies airports for flight bookings and schedules (e.g., JFK, LAX, CDG).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{3}$"
  tier: [VARCHAR, transportation]
  release_priority: 4
  aliases: null
  samples:
    - "JFK"
    - "LAX"
    - "CDG"
    - "LHR"
    - "NRT"
  references: null
  notes: >
    v1 migration: Was address.iata_code. Transform uppercases.
    3-letter code. Examples: JFK (New York), LAX (Los Angeles), CDG (Paris),
    LHR (London), NRT (Tokyo).

geography.transportation.icao_code:
  title: "ICAO Airport Code"
  description: >
    International Civil Aviation Organization airport code (4 letters).
    More comprehensive than IATA; includes some smaller airports
    (e.g., KJFK, KLAX, LFPG).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{4}$"
  tier: [VARCHAR, transportation]
  release_priority: 3
  aliases: null
  samples:
    - "KJFK"
    - "KLAX"
    - "LFPG"
    - "EGLL"
    - "RJTT"
  references: null
  notes: >
    v1 migration: Was address.icao_code. Transform uppercases.
    4-letter code. Examples: KJFK (New York), KLAX (Los Angeles),
    LFPG (Paris), EGLL (London), RJTT (Tokyo).

geography.transportation.iso6346:
  title: "Shipping Container Code (ISO 6346)"
  description: >
    International shipping container identification code per ISO 6346.
    Owner code (3 uppercase letters) + equipment category (U, J, or Z) +
    serial number (6 digits) + check digit (1 digit). Total 11 characters.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{3}[UJZ]\\d{7}$"
  tier: [VARCHAR, transportation]
  release_priority: 3
  aliases: [container_code, bic_code]
  samples:
    - "MSCU1234567"
    - "HLXU3456789"
    - "CMAU6543210"
    - "TRIU7890123"
    - "MSKU2345678"
  references: null
  notes: >
    ISO 6346:1995 — Freight containers. U = freight container,
    J = detachable freight container-related equipment,
    Z = trailer/chassis. 7th digit is a check digit (mod 11).

geography.transportation.hs_code:
  title: "HS Tariff Code"
  description: >
    World Customs Organization Harmonized System code for classifying
    traded products. 6 digits at HS level, up to 10 digits for national
    sub-headings. May include dot separators between groups.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^\\d{4}\\.?\\d{2}(\\.?\\d{2}){0,2}$"
  tier: [VARCHAR, transportation]
  release_priority: 3
  aliases: [harmonized_system, tariff_code]
  samples:
    - "8471.30"
    - "6110.20.20"
    - "0901.11.00.10"
    - "8517.12"
    - "3004.90.92"
  references: null
  notes: >
    HS is maintained by the World Customs Organization. First 6 digits
    are internationally standardised; additional digits are country-specific.

geography.transportation.unlocode:
  title: "UN/LOCODE"
  description: >
    United Nations Code for Trade and Transport Locations. 5-character code:
    2-letter ISO 3166-1 country code followed by 3-character location code
    (uppercase letters or digits 2-9).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose:
    country: "SUBSTRING({col}, 1, 2)"
    location: "SUBSTRING({col}, 3, 3)"
  validation:
    type: string
    pattern: "^[A-Z]{2}[A-Z2-9]{3}$"
  tier: [VARCHAR, transportation]
  release_priority: 3
  aliases: [un_locode]
  samples:
    - "USLAX"
    - "GBLON"
    - "DEHAM"
    - "SGSIN"
    - "NLRTM"
  references: null
  notes: >
    UNECE Recommendation 16. Over 100,000 locations worldwide. Used in
    shipping, trade documentation, and customs declarations.

