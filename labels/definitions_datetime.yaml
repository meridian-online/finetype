  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^\\d{4}/\\d{2}/\\d{2}$"
    minLength: 10
    maxLength: 10
  tier: [DATE, date]
  release_priority: 5
  aliases: []
  samples:
    - "2024/01/15"
    - "2023/12/31"
    - "2000/06/01"
  references: null
  notes: >
    New in format coverage expansion. High prevalence in East Asian data.

datetime.date.ymd_dot:
