# FineType v2 — Identity Domain Definitions
#
# Hierarchy: domain.category.type (locale is a field, not in the key)
# Full label at inference time: domain.category.type.LOCALE
#
# Each definition is a transformation contract:
#   - broad_type:     Target DuckDB type
#   - format_string:  DuckDB strptime format (null if not strptime-based)
#   - transform:      DuckDB SQL expression ({col} = column placeholder)
#   - transform_ext:  Enhanced transform requiring a DuckDB extension
#   - validation:     JSON Schema fragment for data quality checks
#   - tier:           Path from root to parent in the inference graph
#   - decompose:      Optional struct expansion for multi-field output
#
# Identity domain covers:
#   - personal data (names, email, phone, credentials)
#   - demographic data (age, gender, nationality)
#   - financial data (credit cards, crypto addresses, payment methods)
#   - security data (passwords, tokens, usernames)
# ─────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: person
#
# Personally identifiable information (PII) and demographic data.
# WARNING: These types contain sensitive personal data. Handle with care
# and comply with data protection regulations (GDPR, CCPA, etc.).
# ═════════════════════════════════════════════════════════════════════

identity.person.full_name:
  title: "Full Name"
  description: >
    Complete person name (first and last names, possibly including middle names).
    Locale-specific due to name order and formatting conventions (e.g.,
    Western "FirstName LastName" vs East Asian "LastName FirstName").
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    first_name: "REGEXP_EXTRACT({col}, '^([^ ]+)')"
    last_name: "REGEXP_EXTRACT({col}, '([^ ]+)$')"
  validation:
    type: string
    minLength: 2
    maxLength: 200
    pattern: "^[\\p{L}\\s'\\-.,]+$"
  tier: [VARCHAR, person]
  release_priority: 5
  aliases: [name, fullname]
  samples:
    - "John Smith"
    - "María García"
    - "Jacques Dubois"
    - "田中太郎"
    - "محمد علي"
    - "Smith, Mr. John"
    - "Dr. Jane Wilson"
    - "BROWN, ALICE"
  references: null
  notes: >
    v1 migration: Was person.full_name. Locale-specific due to name order
    conventions. Simple decompose extracts first and last words; more sophisticated
    parsing requires NLP. Includes Unicode letter support for international names.

identity.person.first_name:
  title: "First Name"
  description: >
    Given name (first name). Locale-specific due to cultural naming conventions.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 1
    maxLength: 100
    pattern: "^[\\p{L}\\s'\\-]+$"
  tier: [VARCHAR, person]
  release_priority: 4
  aliases: [given_name]
  samples:
    - "John"
    - "María"
    - "Jacques"
    - "太郎"
    - "محمد"
  references: null
  notes: >
    v1 migration: Was person.first_name. Locale-specific for cultural naming.
    Supports Unicode letters and common separators (apostrophes, hyphens).

identity.person.last_name:
  title: "Last Name"
  description: >
    Family name (surname). Locale-specific due to surname conventions which vary
    by culture (e.g., patronymic names in Scandinavian and Russian cultures).
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 1
    maxLength: 100
    pattern: "^[\\p{L}\\s'\\-]+$"
  tier: [VARCHAR, person]
  release_priority: 4
  aliases: [surname, family_name]
  samples:
    - "Smith"
    - "García"
    - "Dubois"
    - "田中"
    - "علي"
  references: null
  notes: >
    v1 migration: Was person.last_name (and person.surname). Locale-specific.
    Supports Unicode letters and common separators.

identity.person.email:
  title: "Email Address"
  description: >
    Standard email address (RFC 5322 simplified). Format: local@domain.
    Universal format but may include internationalized domain names (IDN).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "LOWER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose:
    local: "REGEXP_EXTRACT({col}, '^([^@]+)')"
    domain: "REGEXP_EXTRACT({col}, '@(.+)$')"
  validation:
    type: string
    pattern: "^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$"
    minLength: 5
    maxLength: 254
  tier: [VARCHAR, person]
  release_priority: 5
  aliases: [email_address]
  samples:
    - "john.smith@example.com"
    - "user+tag@domain.org"
    - "test123@company.co.uk"
  references: null
  notes: >
    v1 migration: Was person.email. Transform lowercases for canonical form.
    Decompose extracts local and domain parts. Pattern uses simplified RFC 5322.

identity.person.phone_number:
  title: "Phone Number"
  description: >
    Telephone number in various formats. Locale-specific due to digit grouping,
    area code positions, and formatting conventions (e.g., US +1 (xxx) xxx-xxxx
    vs EU +xx-xxx-xxx-xxxx). May include country code, area code, and extension.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU, JA, ZH, KO, AR, ZA]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    country_code: "REGEXP_EXTRACT({col}, '^\\+?([0-9]{1,3})')"
    area_code: "REGEXP_EXTRACT({col}, '[^0-9]([0-9]{3})[^0-9]')"
    digits_only: "REGEXP_REPLACE({col}, '[^0-9]', '')"
  validation:
    type: string
    minLength: 7
    maxLength: 30
    pattern: "^[+]?[0-9\\s()\\-\\./\\u2013]+([\\s]*(ext\\.?|Ext\\.?|x|#)[\\s]*\\d{1,5})?([\\s]*(Work|Cell|Fax|Home|Office))?$"
  # Per-locale phone number patterns derived from Google libphonenumber
  # (Apache 2.0). Each locale entry validates the national number format
  # including optional country code prefix and optional extension suffix.
  #
  # Extension pattern (shared across locales):
  #   (\s*(ext\.?|Ext\.?|x|#)\s*\d{1,5})?(\s*(Work|Cell|Fax|Home|Office))?$
  #
  # Separator character class (shared across locales):
  #   [\s\-./\u2013]  — space, hyphen, dot, slash, en-dash
  #
  # Trunk prefix (0) convention: +CC(0) is used in UK, DE, FR, ZA, AU
  # to indicate the trunk prefix is dropped when dialling internationally.
  #
  # See data/cldr/README.md for attribution and refresh instructions.
  validation_by_locale:
    EN_US:
      type: string
      pattern: "^(\\+?1[\\s\\-./\\u2013]*)?\\(?\\d{3}\\)?[\\s\\-./\\u2013]*\\d{3}[\\s\\-./\\u2013]*\\d{4}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    EN_CA:
      type: string
      pattern: "^(\\+?1[\\s\\-./\\u2013]*)?\\(?\\d{3}\\)?[\\s\\-./\\u2013]*\\d{3}[\\s\\-./\\u2013]*\\d{4}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    EN_GB:
      type: string
      pattern: "^(\\+?44[\\s\\-./\\u2013]*(\\(0\\))?)?0?\\d{2,5}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    EN_AU:
      type: string
      pattern: "^(\\+?61[\\s\\-./\\u2013]*(\\(0\\))?)?\\(?0?\\d{1,4}\\)?([\\s\\-./\\u2013]*\\d{1,4}){2,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    DE:
      type: string
      pattern: "^(\\+?49[\\s\\-./\\u2013]*(\\(0\\))?)?0?\\d{2,5}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 8
      maxLength: 35
    FR:
      type: string
      pattern: "^(\\+?33[\\s\\-./\\u2013]*(\\(0\\))?)?0?[1-9]([\\s\\-./\\u2013]*\\d{2}){4}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    ES:
      type: string
      pattern: "^(\\+?34[\\s\\-./\\u2013]*)?[5-9]\\d{2}([\\s\\-./\\u2013]*\\d{2}){3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 9
      maxLength: 35
    IT:
      type: string
      pattern: "^(\\+?39[\\s\\-./\\u2013]*)?0?\\d{1,4}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 9
      maxLength: 35
    NL:
      type: string
      pattern: "^(\\+?31[\\s\\-./\\u2013]*)?0?\\d{1,3}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    PL:
      type: string
      pattern: "^(\\+?48[\\s\\-./\\u2013]*)?\\d{3}([\\s\\-./\\u2013]*\\d{3}){2}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 9
      maxLength: 35
    RU:
      type: string
      pattern: "^(\\+?7[\\s\\-./\\u2013]*|8[\\s\\-./\\u2013]*)?\\(?\\d{3}\\)?([\\s\\-./\\u2013]*\\d{2,3}){3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    JA:
      type: string
      pattern: "^(\\+?81[\\s\\-./\\u2013]*)?0?\\d{1,4}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 10
      maxLength: 35
    ZH:
      type: string
      pattern: "^(\\+?86[\\s\\-./\\u2013]*)?0?\\d{2,4}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 11
      maxLength: 35
    KO:
      type: string
      pattern: "^(\\+?82[\\s\\-./\\u2013]*)?0?\\d{1,3}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 9
      maxLength: 35
    ZA:
      type: string
      pattern: "^(\\+?27[\\s\\-./\\u2013]*(\\(0\\))?)?0?\\d{2}([\\s\\-./\\u2013]*\\d{1,8}){1,3}(\\s*(ext\\.?|Ext\\.?|x|#)\\s*\\d{1,5})?(\\s*(Work|Cell|Fax|Home|Office))?$"
      minLength: 9
      maxLength: 35
  tier: [VARCHAR, person]
  release_priority: 4
  aliases: [telephone, phone]
  samples:
    - "+1 (555) 123-4567"
    - "555-123-4567"
    - "+44 20 7946 0958"
    - "+33 1 42 68 53 00"
    - "07911 123456"
  references: null
  notes: >
    v1 migration: Was person.phone_number (and person.telephone).
    Locale-specific for formatting. Decompose extracts country code, area code,
    and digits-only version. Pattern is permissive to handle various formats.

identity.person.username:
  title: "Username"
  description: >
    Online username or handle for a user account. Typically alphanumeric with
    underscores, hyphens, or dots. Case-insensitive storage. Locale-specific
    due to character set restrictions.
  designation: locale_specific
  locales: [EN, EN_AU, EN_GB, EN_CA, EN_US, DE, FR, ES, IT, NL, PL, RU]
  broad_type: VARCHAR
  format_string: null
  transform: "LOWER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 3
    maxLength: 32
    pattern: "^[a-zA-Z0-9_\\-.]{3,32}$"
  tier: [VARCHAR, person]
  release_priority: 4
  aliases: [handle, account_name]
  samples:
    - "john.smith"
    - "user_123"
    - "alice-wonderland"
    - "bob.jones_42"
  references: null
  notes: >
    v1 migration: Was person.username. Transform lowercases for canonical form.
    Typically 3-32 characters. Allows alphanumeric, underscore, hyphen, dot.

identity.person.password:
  title: "Password"
  description: >
    Authentication credential. Broad categorization due to high variance in
    format and strength requirements. Should never be stored in plaintext.
    Hash or encrypt passwords immediately.
  designation: broad_characters
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    minLength: 1
    maxLength: 255
  tier: [VARCHAR, person]
  release_priority: 0
  aliases: null
  samples:
    - "aB3#xY9@mK2"
    - "MySecureP@ss123"
    - "correct-horse-battery-staple"
  references: null
  notes: >
    v1 migration: Was person.password marked broad_characters. NEVER store
    plaintext passwords. Always hash (bcrypt, Argon2) or encrypt.
    Detection is for audit purposes only.

identity.person.gender:
  title: "Gender"
  description: >
    Gender identity. May be "Male", "Female", "Non-binary", "Other", or similar.
    Broad categorization due to variance in values and encoding.
  designation: broad_words
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    enum:
      - Male
      - Female
      - Non-binary
      - Other
      - Prefer not to say
      - Unknown
  tier: [VARCHAR, person]
  release_priority: 1
  aliases: null
  samples:
    - "Male"
    - "Female"
    - "Non-binary"
    - "Other"
  references: null
  notes: >
    v1 migration: Was person.gender marked broad_words. Enum is illustrative;
    actual values depend on data source. Consider inclusivity and cultural context.

identity.person.gender_code:
  title: "Gender Code"
  description: >
    Single character or short code representing gender (M, F, X, O, etc.).
    Broad categorization.
  designation: broad_words
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(UPPER({col}) AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[MFX]$"
  tier: [VARCHAR, person]
  release_priority: 1
  aliases: null
  samples:
    - "M"
    - "F"
    - "X"
  references: null
  notes: >
    v1 migration: Was person.gender_code marked broad_words. Single character
    or code. Transform uppercases. Common: M (male), F (female), X (other/not specified).

identity.person.gender_symbol:
  title: "Gender Symbol"
  description: >
    Unicode symbol representing gender (♂, ♀, ⚧, etc.).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[♂♀⚧⚪]$"
  tier: [VARCHAR, person]
  release_priority: 2
  aliases: null
  samples:
    - "♂"
    - "♀"
    - "⚧"
  references: null
  notes: >
    v1 migration: Was person.gender_symbol. Single Unicode symbol.

