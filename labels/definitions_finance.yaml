# FineType v2 — Finance Domain Definitions
#
# Hierarchy: domain.category.type (locale is a field, not in the key)
# Full label at inference time: domain.category.type.LOCALE
#
# Each definition is a transformation contract:
#   - broad_type:     Target DuckDB type
#   - format_string:  DuckDB strptime format (null if not strptime-based)
#   - transform:      DuckDB SQL expression ({col} = column placeholder)
#   - transform_ext:  Enhanced transform requiring a DuckDB extension
#   - validation:     JSON Schema fragment for data quality checks
#   - tier:           Path from root to parent in the inference graph
#   - decompose:      Optional struct expansion for multi-field output
#
# Finance domain covers:
#   - banking identifiers (IBAN, SWIFT/BIC)
#   - currency amounts (US format, EU format)
#   - currency metadata (codes, symbols)
#   - securities identifiers (CUSIP, ISIN, SEDOL, LEI)
#   - cryptocurrency addresses (Bitcoin, Ethereum)
#   - payment instruments (credit cards, PayPal)
# ─────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: banking
#
# International banking identifiers.
# ═════════════════════════════════════════════════════════════════════

finance.banking.swift_bic:
  title: "SWIFT/BIC"
  description: >
    Society for Worldwide Interbank Financial Telecommunication code (also called
    Bank Identifier Code). 8 or 11 character code identifying financial institutions.
    Format: 4-letter bank code + 2-letter country code (ISO 3166) + 2-character
    location code + optional 3-character branch code.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose:
    bank_code: "SUBSTRING({col}, 1, 4)"
    country_code: "SUBSTRING({col}, 5, 2)"
    location_code: "SUBSTRING({col}, 7, 2)"
    branch_code: "CASE WHEN LENGTH({col}) = 11 THEN SUBSTRING({col}, 9, 3) ELSE NULL END"
  validation:
    type: string
    pattern: "^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: [bic, swift_code]
  samples:
    - "DEUTDEFF"
    - "BNPAFRPP"
    - "CHASUS33XXX"
    - "BOFAUS3N"
  references: null
  notes: >
    New in v2. SWIFT/BIC codes are used for international wire transfers.
    8-character codes identify the head office; 11-character codes include a
    branch identifier. "XXX" as branch code also means head office.

finance.banking.iban:
  title: "IBAN"
  description: >
    International Bank Account Number (ISO 13616). Up to 34 alphanumeric
    characters: 2-letter country code (ISO 3166-1 alpha-2) + 2 check digits
    + up to 30 alphanumeric BBAN (Basic Bank Account Number) characters.
    Used for international money transfers. The mod-97 check digit algorithm
    provides strong detection signal.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose:
    country_code: "SUBSTRING({col}, 1, 2)"
    check_digits: "SUBSTRING({col}, 3, 2)"
    bban: "SUBSTRING({col}, 5)"
  validation:
    type: string
    pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]{11,30}$"
    minLength: 15
    maxLength: 34
  tier: [VARCHAR, banking]
  release_priority: 3
  aliases: [international_bank_account_number]
  samples:
    - "GB29NWBK60161331926819"
    - "DE89370400440532013000"
    - "FR7630006000011234567890189"
    - "NL91ABNA0417164300"
    - "ES9121000418450200051332"
    - "IT60X0542811101000000123456"
  references: null
  notes: >
    New in v0.5.1 (NNFT-180). IBAN check digit algorithm (ISO 7064 Mod 97-10):
    move first 4 characters to end, convert letters to numbers (A=10..Z=35),
    compute mod 97 — result must equal 1. Country-specific BBAN lengths and
    formats exist but the regex validates the general structure.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: currency
#
# Currency amounts with format-specific transformations.
# Each format produces a distinct DuckDB transform, following the
# datetime principle where distinct formats deserve distinct types.
# ═════════════════════════════════════════════════════════════════════

finance.currency.amount_us:
  title: "Currency Amount (US Format)"
  description: >
    Currency amount with US/international formatting: optional currency symbol
    prefix ($, £, ¥, etc.), optional negative sign or parentheses for negative,
    comma thousands separator, period decimal separator.
    Examples: $1,234.56, -$999.99, £10,000.00, $0.50, ¥1,000
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DECIMAL
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(CASE WHEN {col} LIKE '(%' THEN '-' || REPLACE(REPLACE({col}, '(', ''), ')', '') ELSE {col} END, '^[^0-9\\-]+', ''), '[^0-9\\.\\-]', '', 'g'), ',', '', 'g'), '\\s+', '', 'g') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '^([^0-9\\-\\(]+)')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(CASE WHEN {col} LIKE '(%' THEN '-' || REPLACE(REPLACE({col}, '(', ''), ')', '') ELSE {col} END, '^[^0-9\\-]+', ''), '[^0-9\\.\\-]', '', 'g'), ',', '', 'g'), '\\s+', '', 'g') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^[\\$£¥₹₩₿\\p{Sc}]?\\s?-?\\s?[0-9]{1,3}(,[0-9]{3})*(\\.[0-9]{1,2})?$|^-?[\\$£¥₹₩₿\\p{Sc}]\\s?[0-9]{1,3}(,[0-9]{3})*(\\.[0-9]{1,2})?$|^\\([\\$£¥₹₩₿\\p{Sc}]?[0-9]{1,3}(,[0-9]{3})*(\\.[0-9]{1,2})?\\)$"
  tier: [VARCHAR, currency]
  release_priority: 4
  aliases: [currency_amount, money_us, price]
  samples:
    - "$1,234.56"
    - "-$999.99"
    - "£10,000.00"
    - "$0.50"
    - "¥1,000"
    - "$42.00"
    - "$1,000,000.00"
    - "£250.75"
    - "($1,234.56)"
    - "($999.99)"
  references: null
  notes: >
    New in v0.5.1 (NNFT-180). US/international format uses comma as thousands
    separator and period as decimal separator. Transform handles both standard
    negatives (-$X) and accounting notation (($X)). Casts to DECIMAL(18,2).
    Distinct from amount_eu which uses the inverted separator convention.

finance.currency.amount_eu:
  title: "Currency Amount (EU Format)"
  description: >
    Currency amount with European formatting: optional currency symbol
    (prefix or suffix), period thousands separator, comma decimal separator.
    Examples: €1.234,56, 1.234,56 €, -€999,99, €0,50
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DECIMAL
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[€\\$£¥₹₩₿\\p{Sc}]', '', 'g'), '\\s+', '', 'g'), '\\.', '', 'g'), ',', '.') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '([€\\$£¥₹₩₿\\p{Sc}])')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[€\\$£¥₹₩₿\\p{Sc}]', '', 'g'), '\\s+', '', 'g'), '\\.', '', 'g'), ',', '.') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^[€\\$£¥₹₩₿\\p{Sc}]?\\s?-?\\s?[0-9]{1,3}(\\.[0-9]{3})*(,[0-9]{1,2})?\\s?[€\\$£¥₹₩₿\\p{Sc}]?$|^-?[€\\$£¥₹₩₿\\p{Sc}]?\\s?[0-9]{1,3}(\\.[0-9]{3})*(,[0-9]{1,2})?\\s?[€\\$£¥₹₩₿\\p{Sc}]?$"
  tier: [VARCHAR, currency]
  release_priority: 4
  aliases: [currency_amount_eu, money_eu, price_eu]
  samples:
    - "€1.234,56"
    - "1.234,56 €"
    - "-€999,99"
    - "€0,50"
    - "€42,00"
    - "€1.000.000,00"
    - "1.250,75 €"
    - "€100,00"
  references: null
  notes: >
    New in v0.5.1 (NNFT-180). European format uses period as thousands separator
    and comma as decimal separator. Transform strips currency symbol, removes
    period thousands separators, replaces comma with period, then casts to
    DECIMAL(18,2). Distinct from amount_us which uses US separator convention.

finance.currency.currency_code:
  title: "Currency Code (ISO 4217)"
  description: >
    Three-letter currency code as defined by ISO 4217. Examples: USD, EUR, GBP, JPY.
    Used in financial data, trading systems, and international commerce.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "UPPER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[A-Z]{3}$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: [iso_4217, currency_iso]
  samples:
    - "USD"
    - "EUR"
    - "GBP"
    - "JPY"
    - "CHF"
    - "AUD"
  references: null
  notes: >
    v1 migration: Was finance.currency_iso_code. Three uppercase letters.
    First two letters usually match ISO 3166-1 country code (US→USD, GB→GBP),
    third letter is typically initial of currency name (D→Dollar, P→Pound).

finance.currency.currency_symbol:
  title: "Currency Symbol"
  description: >
    Unicode currency symbol character. Examples: $, €, £, ¥, ₹, ₩, ₿.
    Single character (or short sequence) representing a currency.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[\\p{Sc}]+$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: [currency_sign]
  samples:
    - "$"
    - "€"
    - "£"
    - "¥"
    - "₹"
    - "₩"
    - "₿"
  references: null
  notes: >
    v1 migration: Was finance.currency_symbol. Uses Unicode currency symbol
    category (\\p{Sc}). Short strings — typically 1 character. Low priority
    due to ambiguity ($ could be USD, AUD, CAD, etc.).

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: payment
#
# Payment instruments and card network identifiers.
# Sensitive PII; handle with care.
# ═════════════════════════════════════════════════════════════════════

finance.payment.credit_card_number:
  title: "Credit Card Number"
  description: >
    Credit card or debit card primary account number (PAN).
    Typically 13-19 digits. Last digit is check digit (Luhn algorithm).
    HIGHLY SENSITIVE — encrypt immediately in production.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    issuer_identification_number: "REGEXP_EXTRACT({col}, '^([0-9]{6})')"
    card_type: "CASE WHEN {col} LIKE '4%' THEN 'Visa' WHEN {col} LIKE '5[1-5]%' THEN 'Mastercard' WHEN {col} LIKE '3[47]%' THEN 'Amex' ELSE 'Other' END"
    last_four: "REGEXP_EXTRACT({col}, '([0-9]{4})$')"
  validation:
    type: string
    pattern: "^[0-9]{13,19}$"
  tier: [VARCHAR, payment]
  release_priority: 4
  aliases: [pan, credit_card]
  samples:
    - "4532015112830366"
    - "5425233010103442"
    - "374245455400126"
  references: null
  notes: >
    v1 migration: Was payment.credit_card_number. Check digit uses Luhn algorithm
    (validated in crate, not SQL). MUST be encrypted/tokenized in production.
    PCI DSS compliance required. Decompose extracts issuer ID, card type, last 4.

finance.payment.credit_card_expiration_date:
  title: "Credit Card Expiration Date"
  description: >
    Credit card expiration date in MM/YY or MM/YYYY format.
    Transforms to DATE (end of month).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: DATE
  format_string: "%m/%y"
  transform: "DATE_TRUNC('month', CAST(CONCAT('20', REGEXP_EXTRACT({col}, '^([0-9]{2})/([0-9]{2})$'), '-', REGEXP_EXTRACT({col}, '^([0-9]{2})) AS DATE) + INTERVAL '1 month' - INTERVAL '1 day')"
  transform_ext: null
  decompose:
    month: "CAST(REGEXP_EXTRACT({col}, '^([0-9]{2})') AS SMALLINT)"
    year: "CAST(REGEXP_EXTRACT({col}, '/([0-9]{2,4})$') AS SMALLINT)"
  validation:
    type: string
    pattern: "^(0[1-9]|1[0-2])/([0-9]{2}|[0-9]{4})$"
  tier: [DATE, payment]
  release_priority: 4
  aliases: [card_expiry]
  samples:
    - "12/25"
    - "06/28"
    - "03/2026"
  references: null
  notes: >
    v1 migration: Was payment.credit_card_expiration_date. Transform converts
    MM/YY to end-of-month DATE. Decompose extracts month and year separately.
    Typical format: MM/YY (e.g., 12/25 for December 2025).

finance.payment.paypal_email:
  title: "PayPal Email"
  description: >
    Email address associated with a PayPal account. Format is standard email.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "LOWER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose:
    local: "REGEXP_EXTRACT(LOWER({col}), '^([^@]+)')"
    domain: "REGEXP_EXTRACT(LOWER({col}), '@(.+)$')"
  validation:
    type: string
    pattern: "^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: [paypal_account]
  samples:
    - "user@example.com"
    - "merchant+paypal@business.org"
  references: null
  notes: >
    v1 migration: Was payment.paypal. Standard email format; same as
    identity.person.email but explicitly PayPal context.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: securities
#
# Securities identification numbers (CUSIP, ISIN, SEDOL, LEI).
# Governed by ISO standards for trading and clearing.
# ═════════════════════════════════════════════════════════════════════

finance.securities.cusip:
  title: "CUSIP"
  description: >
    Committee on Uniform Securities Identification Procedures identifier.
    9-character alphanumeric code for US and Canadian securities. Format:
    6-character issuer code + 2-character issue number + 1 check digit.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    issuer: "SUBSTRING({col}, 1, 6)"
    issue: "SUBSTRING({col}, 7, 2)"
    check_digit: "SUBSTRING({col}, 9, 1)"
  validation:
    type: string
    pattern: "^[A-Z0-9]{8}[0-9]$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: null
  samples:
    - "037833100"
    - "17275R102"
    - "594918104"
  references: null
  notes: >
    New in v2. CUSIP is the primary identifier for US/Canadian securities.
    Check digit uses a custom weighted algorithm where characters at even positions
    are doubled (similar to Luhn but with alphanumeric conversion).

finance.securities.isin:
  title: "ISIN"
  description: >
    International Securities Identification Number. 12-character alphanumeric code
    that uniquely identifies a specific securities issue. Format: 2-letter country
    code (ISO 3166-1) + 9-character alphanumeric NSIN + 1 check digit (Luhn on
    alpha-to-numeric conversion where A=10, B=11, ..., Z=35).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    country: "SUBSTRING({col}, 1, 2)"
    nsin: "SUBSTRING({col}, 3, 9)"
    check_digit: "SUBSTRING({col}, 12, 1)"
  validation:
    type: string
    pattern: "^[A-Z]{2}[A-Z0-9]{9}[0-9]$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: null
  samples:
    - "US0378331005"
    - "GB0002634946"
    - "JP3633400001"
    - "DE0007164600"
  references: null
  notes: >
    New in v2. ISIN is the global standard for securities identification (ISO 6166).
    The check digit uses the Luhn algorithm applied to the full string after converting
    letters to numbers (A=10, B=11, ..., Z=35). Country code follows ISO 3166-1 alpha-2.

finance.securities.sedol:
  title: "SEDOL"
  description: >
    Stock Exchange Daily Official List code. 7-character identifier for
    UK and Irish securities. Format: 6 alphanumeric characters + 1 check digit
    (weighted sum with weights 1,3,1,7,3,9 mod 10).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^[B-DF-HJ-NP-TV-Z0-9]{6}[0-9]$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: null
  samples:
    - "0263494"
    - "B0WNLY7"
    - "3134865"
  references: null
  notes: >
    New in v2. SEDOL codes never contain vowels (to avoid forming words).
    The check digit is computed as (10 - (weighted_sum mod 10)) mod 10
    with weights [1, 3, 1, 7, 3, 9] applied to the first 6 characters
    (digits 0-9 have face value, letters B=11, C=12, ..., Z=35, skipping vowels).

finance.securities.lei:
  title: "LEI"
  description: >
    Legal Entity Identifier. 20-character alphanumeric code that uniquely identifies
    legal entities participating in financial transactions. Format: 4-digit LOU
    (Local Operating Unit) prefix + 14-character entity identifier + 2 check digits
    (ISO 7064 Mod 97-10, same algorithm as IBAN check digits).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    lou_prefix: "SUBSTRING({col}, 1, 4)"
    entity_id: "SUBSTRING({col}, 5, 14)"
    check_digits: "SUBSTRING({col}, 19, 2)"
  validation:
    type: string
    pattern: "^[0-9]{4}[A-Z0-9]{14}[0-9]{2}$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: [legal_entity_identifier]
  samples:
    - "529900T8BM49AURSDO55"
    - "213800WSGIIZCXF1P572"
    - "549300MLUDYVRQOOXS22"
  references: null
  notes: >
    New in v2. LEI was introduced after the 2008 financial crisis for entity
    identification in financial transactions. Check digits use ISO 7064 Mod 97-10:
    convert letters to numbers (A=10..Z=35), compute mod 97, check digits = 98 - remainder.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: crypto
#
# Cryptocurrency wallet and contract addresses.
# ═════════════════════════════════════════════════════════════════════

finance.crypto.bitcoin_address:
  title: "Bitcoin Address"
  description: >
    Bitcoin wallet address. P2PKH format starts with 1, P2SH with 3, P2WPKH with bc1.
    26-35 characters. Base58Check encoding.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS VARCHAR)"
  transform_ext: null
  decompose:
    address_type: "CASE WHEN {col} LIKE '1%' THEN 'P2PKH' WHEN {col} LIKE '3%' THEN 'P2SH' WHEN {col} LIKE 'bc1%' THEN 'P2WPKH' ELSE 'Unknown' END"
  validation:
    type: string
    pattern: "^[13][a-km-zA-HJ-NP-Z1-9]{25,34}$|^bc1[a-z0-9]{39,59}$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: null
  samples:
    - "1A1z7agoat2GPFH7pPPPP..."
    - "3J98t1WpEZ73CNmYviecrnyiWrnqRhWNLy"
    - "bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4"
  references: null
  notes: >
    v1 migration: Was payment.bitcoin_address. Pattern covers P2PKH (1..),
    P2SH (3..), P2WPKH (bc1...). Addresses are not case-sensitive but typically
    use mixed case for checksums.

finance.crypto.ethereum_address:
  title: "Ethereum Address"
  description: >
    Ethereum wallet or contract address. 42 characters: 0x + 40 hex digits.
    May be EIP-55 checksummed (mixed case) or not.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "LOWER(CAST({col} AS VARCHAR))"
  transform_ext: null
  decompose: null
  validation:
    type: string
    pattern: "^0x[a-fA-F0-9]{40}$"
  tier: [VARCHAR, payment]
  release_priority: 3
  aliases: null
  samples:
    - "0x742d35Cc6634C0532925a3b844Bc3e7c1f2B9C2C"
    - "0x0000000000000000000000000000000000000000"
    - "0xd9965507d3b0ce0ce6932b0337db0c11b85fcf7d"
  references: null
  notes: >
    v1 migration: Was payment.ethereum_address. Transform lowercases.
    EIP-55 checksummed addresses use mixed case but lowercase canonical form
    is preferable for storage.

# ═════════════════════════════════════════════════════════════════════
# NEW CURRENCY FORMATS (Format Coverage Expansion — NNFT-223)
#
# 11 additional currency amount formats covering:
#   - Accounting notation (parentheses for negatives)
#   - Non-Western grouping (Indian lakh/crore, Swiss apostrophe)
#   - Symbol position variants (EU suffix, code prefix)
#   - Zero-decimal currencies (JPY, KRW, VND)
#   - Minor unit representation (Stripe/Adyen integer cents)
#   - Multi-character currency symbols (R$, HK$, kr, Kč)
#   - Cryptocurrency high-precision amounts
#   - Alternative negative notation (trailing minus, CR/DR)
# ═════════════════════════════════════════════════════════════════════

finance.currency.amount_accounting_us:
  title: "Currency Amount (US Accounting)"
  description: >
    US accounting format where negative values are enclosed in parentheses
    rather than using a minus sign. Standard in 10-K filings, ledgers,
    SAP, Smartsheet, and Dataiku exports. Comma thousands, period decimal.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE({col}, '(', '-'), ')', ''), '$', ''), ',', ''), ' ', '') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    is_negative: "CASE WHEN {col} LIKE '(%' THEN true ELSE false END"
    numeric_value: "CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE({col}, '(', '-'), ')', ''), '$', ''), ',', ''), ' ', '') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^\\(?\\$?[0-9]{1,3}(,[0-9]{3})*(\\.[0-9]{1,2})?\\)?$"
  tier: [VARCHAR, currency]
  release_priority: 5
  aliases: [accounting, gaap_amount]
  samples:
    - "$1,234.56"
    - "($1,234.56)"
    - "$0.50"
    - "($999.99)"
    - "$10,000.00"
  references: null
  notes: >
    New in format coverage expansion. Parentheses = negative is universal
    in US GAAP accounting. Transform strips parens→minus, symbol, commas.

finance.currency.amount_eu_suffix:
  title: "Currency Amount (EU Suffix)"
  description: >
    European format with currency symbol as suffix. Period for thousands,
    comma for decimal, symbol after amount with optional space.
    CLDR default for Germany, France, Spain, Italy, Netherlands.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[€$£¥₹₩₿\\p{Sc}]', '', 'g'), '\\s+', '', 'g'), '\\.', '', 'g'), ',', '.') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '([€$£¥₹₩₿\\p{Sc}]+)\\s*$')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[€$£¥₹₩₿\\p{Sc}]', '', 'g'), '\\s+', '', 'g'), '\\.', '', 'g'), ',', '.') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^-?[0-9]{1,3}(\\.[0-9]{3})*(,[0-9]{1,2})?\\s?[€$£¥₹₩₿\\p{Sc}]$"
  tier: [VARCHAR, currency]
  release_priority: 5
  aliases: [eu_suffix]
  samples:
    - "1.234,56 €"
    - "999,99 €"
    - "-1.234,56 €"
    - "0,50 €"
    - "10.000,00 €"
  references: null
  notes: >
    New in format coverage expansion. CLDR default for most eurozone countries.
    Distinct from amount_eu which allows prefix symbols.

finance.currency.amount_space_sep:
  title: "Currency Amount (Space-Separated Thousands)"
  description: >
    European variant using thin space or regular space for thousands
    grouping, comma for decimal, symbol as suffix. French, Polish,
    Czech formatting convention. Watch for NBSP (U+00A0).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[€$£¥₹₩₿\\p{Sc}]', '', 'g'), '[\\s\\x{00A0}]+', '', 'g'), ',', '.'), '\\.$', '') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '([€$£¥₹₩₿\\p{Sc}]+)')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[€$£¥₹₩₿\\p{Sc}]', '', 'g'), '[\\s\\x{00A0}]+', '', 'g'), ',', '.'), '\\.$', '') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^-?[0-9]{1,3}([\\s\\x{00A0}][0-9]{3})*(,[0-9]{1,2})?\\s?[€$£¥₹₩₿\\p{Sc}]?$"
  tier: [VARCHAR, currency]
  release_priority: 4
  aliases: [fr_amount]
  samples:
    - "1 234,56 €"
    - "999,99 €"
    - "-1 234,56 €"
    - "10 000,00 €"
  references: null
  notes: >
    New in format coverage expansion. French/Polish/Czech convention.
    Must handle both regular space and NBSP (U+00A0) as grouping separator.

finance.currency.amount_indian:
  title: "Currency Amount (Indian Lakh/Crore)"
  description: >
    Indian numbering system with irregular grouping: first three digits,
    then groups of two (XX,XX,XXX pattern). Lakh = 1,00,000 (100k),
    Crore = 1,00,00,000 (10M). Serves 1.4 billion people. Rupee symbol
    prefix. Period decimal separator.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[₹Rs\\.\\s]', '', 'g'), ',', '') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '^([₹]|Rs\\.?\\s?)')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[₹Rs\\.\\s]', '', 'g'), ',', '') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^[₹]?(?:Rs\\.?\\s?)?[0-9]{1,2}(,[0-9]{2})*(,[0-9]{3})(\\.[0-9]{1,2})?$"
  tier: [VARCHAR, currency]
  release_priority: 5
  aliases: [lakh_crore, inr_amount]
  samples:
    - "₹12,34,567.89"
    - "₹1,00,000.00"
    - "₹99,999.50"
    - "Rs. 1,23,456.78"
    - "₹1,00,00,000.00"
  references: null
  notes: >
    New in format coverage expansion. Indian numbering (2,2,3 grouping).
    Key distinguishing signal is irregular comma placement.

finance.currency.amount_ch:
  title: "Currency Amount (Swiss Apostrophe)"
  description: >
    Swiss/Liechtenstein format using apostrophe for thousands separator
    and period for decimal. Supports both straight apostrophe (U+0027)
    and right single quotation mark (U+2019).
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, 'CHF\\s?', ''), '[''\\x{2019}]', '', 'g'), '\\s+', '') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "CASE WHEN {col} LIKE 'CHF%' THEN 'CHF' ELSE NULL END"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, 'CHF\\s?', ''), '[''\\x{2019}]', '', 'g'), '\\s+', '') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^(CHF\\s?)?-?[0-9]{1,3}(['\\x{2019}][0-9]{3})*(\\.[0-9]{1,2})?(\\s?CHF)?$"
  tier: [VARCHAR, currency]
  release_priority: 4
  aliases: [swiss_amount]
  samples:
    - "CHF 1'234.56"
    - "1'234.56 CHF"
    - "CHF 10'000.00"
    - "-CHF 999.99"
  references: null
  notes: >
    New in format coverage expansion. Must handle both U+0027 (apostrophe)
    and U+2019 (right single quotation mark) as thousands separator.

finance.currency.amount_nodecimal:
  title: "Currency Amount (Zero-Decimal Currency)"
  description: >
    Currency amounts for zero-decimal currencies (JPY, KRW, VND, CLP,
    ISK, HUF, and ~15 others). No fractional part. Comma thousands
    grouping with symbol prefix or suffix. broad_type is INTEGER.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[¥₩\\p{Sc}]', '', 'g'), ',', '') AS INTEGER)"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '([¥₩\\p{Sc}])')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[¥₩\\p{Sc}]', '', 'g'), ',', '') AS INTEGER)"
  validation:
    type: string
    pattern: "^[¥₩\\p{Sc}]?-?[0-9]{1,3}(,[0-9]{3})*[¥₩\\p{Sc}]?$"
  tier: [VARCHAR, currency]
  release_priority: 5
  aliases: [jpy_amount, zero_decimal]
  samples:
    - "¥1,234"
    - "₩10,000"
    - "¥100,000"
    - "₩1,234,567"
  references: null
  notes: >
    New in format coverage expansion. Zero-decimal currencies per ISO 4217:
    JPY, KRW, VND, CLP, ISK, HUF, etc. No fractional component.

finance.currency.amount_code_prefix:
  title: "Currency Amount (ISO Code Prefix)"
  description: >
    ISO 4217 three-letter currency code as prefix, followed by amount.
    Standard in SWIFT messages, banking/FX systems, and international
    financial data. Separator conventions vary by currency.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE({col}, '^[A-Z]{3}\\s?', ''), ',', '') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    currency_code: "REGEXP_EXTRACT({col}, '^([A-Z]{3})')"
    numeric_value: "CAST(REGEXP_REPLACE(REGEXP_REPLACE({col}, '^[A-Z]{3}\\s?', ''), ',', '') AS DECIMAL(18,2))"
  validation:
    type: string
    pattern: "^[A-Z]{3}\\s?-?[0-9]{1,3}([,.]?[0-9]{3})*(\\.[0-9]{1,2})?$"
  tier: [VARCHAR, currency]
  release_priority: 5
  aliases: [iso_code_amount]
  samples:
    - "USD 1,234.56"
    - "EUR 1.234,56"
    - "GBP 999.99"
    - "JPY 10,000"
  references: null
  notes: >
    New in format coverage expansion. SWIFT, FX, banking standard.

finance.currency.amount_minor_int:
  title: "Currency Amount (Minor Unit Integer)"
  description: >
    Monetary amount as integer in smallest currency unit (cents, pence, etc.).
    Every major payment processor (Stripe, Adyen, Square, PayPal Braintree)
    stores amounts this way. Column looks like a plain integer but represents
    dollars divided by 100. Detection requires column-name heuristics.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST({col} AS DECIMAL(18,2)) / 100"
  transform_ext: null
  decompose:
    major_units: "CAST({col} AS INTEGER) / 100"
    minor_units: "CAST({col} AS INTEGER) % 100"
  validation:
    type: string
    pattern: "^-?[0-9]+$"
  tier: [VARCHAR, currency]
  release_priority: 3
  aliases: [cents, minor_units]
  samples:
    - "12345"
    - "99999"
    - "50"
    - "100000"
  references: null
  notes: >
    New in format coverage expansion. Stripe, Adyen, Square standard.
    Detection challenge: looks like a plain integer. Requires header hint
    (e.g., "amount_cents", "price_minor") for disambiguation.

finance.currency.amount_crypto:
  title: "Currency Amount (Cryptocurrency)"
  description: >
    Cryptocurrency amount with ticker symbol suffix. Supports high-precision
    decimals (up to 8+ decimal places). Common in exchange exports and
    portfolio tracking data.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE({col}, '\\s*[A-Z]{2,5}$', '') AS DECIMAL(18,8))"
  transform_ext: null
  decompose:
    ticker: "REGEXP_EXTRACT({col}, '([A-Z]{2,5})$')"
    numeric_value: "CAST(REGEXP_REPLACE({col}, '\\s*[A-Z]{2,5}$', '') AS DECIMAL(18,8))"
  validation:
    type: string
    pattern: "^-?[0-9]+\\.?[0-9]*\\s?[A-Z]{2,5}$"
  tier: [VARCHAR, currency]
  release_priority: 3
  aliases: [crypto_amount]
  samples:
    - "0.00123456 BTC"
    - "1.50000000 ETH"
    - "100.00 USDT"
    - "0.025 BTC"
  references: null
  notes: >
    New in format coverage expansion. Crypto amounts can have up to 18 decimal
    places (ETH). Transform casts to DECIMAL(18,8) for reasonable precision.

finance.currency.amount_multisym:
  title: "Currency Amount (Multi-Character Symbol)"
  description: >
    Currency amounts with multi-character symbols: R$ (Brazilian Real),
    HK$ (Hong Kong Dollar), kr (Nordic Krone), Kč (Czech Koruna),
    zł (Polish Zloty). Separator conventions follow local standard.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '^[A-Za-z$₹€£¥₩₿\\p{Sc}\\s]+', ''), '[.,](?=[0-9]{3})', '', 'g'), '[\\s]', '', 'g'), ',', '.') AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    symbol: "REGEXP_EXTRACT({col}, '^([A-Za-z$₹€£¥₩₿\\p{Sc}\\s]+)')"
  validation:
    type: string
    pattern: "^(R\\$|HK\\$|NT\\$|S\\$|A\\$|C\\$|NZ\\$|kr|Kč|zł|Ft|lei|Rp|Rs\\.?)\\s?-?[0-9]"
  tier: [VARCHAR, currency]
  release_priority: 4
  aliases: []
  samples:
    - "R$ 1.234,56"
    - "HK$ 1,234.56"
    - "kr 1 234,56"
    - "Kč 1 234,56"
    - "zł 1 234,56"
  references: null
  notes: >
    New in format coverage expansion. Multi-character symbols generalize
    locale-specific parsing. Transform strips symbol, normalizes separators.

finance.currency.amount_neg_trailing:
  title: "Currency Amount (Trailing Negative)"
  description: >
    Currency amount with trailing minus sign or CR/DR suffix for negative
    values. Standard in SAP, COBOL/mainframe exports, and bank statement
    formats. The negative indicator follows the amount.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(CASE WHEN {col} LIKE '%-' OR {col} LIKE '%CR' THEN '-' || REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[-]$|\\s*(CR|DR)$', ''), '[\\$€£¥₹]', ''), ',', '') ELSE REGEXP_REPLACE(REGEXP_REPLACE(REGEXP_REPLACE({col}, '[-]$|\\s*(CR|DR)$', ''), '[\\$€£¥₹]', ''), ',', '') END AS DECIMAL(18,2))"
  transform_ext: null
  decompose:
    is_negative: "CASE WHEN {col} LIKE '%-' OR {col} LIKE '%CR' THEN true ELSE false END"
  validation:
    type: string
    pattern: "^[\\$€£¥₹]?[0-9]{1,3}(,[0-9]{3})*(\\.[0-9]{1,2})?\\s?(-|CR|DR)$"
  tier: [VARCHAR, currency]
  release_priority: 3
  aliases: [sap_amount, cobol_amount]
  samples:
    - "$1,234.56-"
    - "1,234.56 CR"
    - "$999.99-"
    - "10,000.00 DR"
  references: null
  notes: >
    New in format coverage expansion. SAP, COBOL/mainframe, bank statements.
    CR = credit (negative in expense context), DR = debit.

# ═════════════════════════════════════════════════════════════════════
# CATEGORY: rate
#
# Financial rates and yield measures. Distinct from currency amounts
# in that they represent percentages, basis points, or return rates
# rather than monetary values.
# ═════════════════════════════════════════════════════════════════════

finance.rate.basis_points:
  title: "Basis Points"
  description: >
    Financial rate expressed in basis points (bps or bp). One basis
    point = 0.01% = 0.0001 in decimal. Standard in fixed-income markets,
    central bank data, and debt analysis. Common in Bloomberg, Reuters,
    and central bank feeds.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE({col}, '\\s*(bps|bp)$', '') AS DECIMAL(18,4)) / 10000"
  transform_ext: null
  decompose:
    raw_bps: "CAST(REGEXP_REPLACE({col}, '\\s*(bps|bp)$', '') AS DECIMAL(10,2))"
    decimal_rate: "CAST(REGEXP_REPLACE({col}, '\\s*(bps|bp)$', '') AS DECIMAL(18,4)) / 10000"
  validation:
    type: string
    pattern: "^-?[0-9]+(\\.[0-9]+)?\\s?(bps|bp)$"
  tier: [VARCHAR, rate]
  release_priority: 3
  aliases: [bps]
  samples:
    - "125 bps"
    - "25.5 bps"
    - "-50 bp"
    - "100 bps"
  references: null
  notes: >
    New in format coverage expansion. Fixed-income standard unit.
    Transform divides by 10000 to convert to decimal rate.

finance.rate.yield:
  title: "Financial Yield / Return"
  description: >
    Financial return or yield notation with explicit sign and percentage.
    Common in Bloomberg, Yahoo Finance, investment return reports.
    Distinct from percentage by requiring explicit +/- sign prefix.
  designation: universal
  locales: [UNIVERSAL]
  broad_type: VARCHAR
  format_string: null
  transform: "CAST(REGEXP_REPLACE({col}, '%$', '') AS DECIMAL(10,4)) / 100"
  transform_ext: null
  decompose:
    raw_pct: "CAST(REGEXP_REPLACE({col}, '%$', '') AS DECIMAL(10,4))"
    decimal_rate: "CAST(REGEXP_REPLACE({col}, '%$', '') AS DECIMAL(10,4)) / 100"
  validation:
    type: string
    pattern: "^[+-][0-9]+(\\.[0-9]+)?%$"
  tier: [VARCHAR, rate]
  release_priority: 3
  aliases: [return_pct]
  samples:
    - "+2.5%"
    - "-1.2%"
    - "+0.75%"
    - "-3.25%"
    - "+10.0%"
  references: null
  notes: >
    New in format coverage expansion. Distinct from percentage type by
    mandatory +/- sign prefix. Financial returns, yield notation.
